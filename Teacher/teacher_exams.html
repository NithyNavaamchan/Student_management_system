<!DOCTYPE html>

    <script>

            colors: {

                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"

    ></script>

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;

        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>

            <li class="px-4 mt-2">
              <a
                href="teacher_timetable.html"

                <svg
                  class="w-5 h-5"

      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <div class="hidden md:flex items-center">
            <svg
              class="w-6 h-6 text-primary"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"

                d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
              />
            </svg>
            <h2 class="ml-2 text-lg font-semibold text-gray-800">
              Student Management System
            </h2>
          </div>
          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
                <span
                  class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"
                ></span>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <div class="p-4 border-b">
                  <h3 class="font-semibold text-gray-800">Notifications</h3>
                </div>
                <div class="divide-y max-h-80 overflow-y-auto">
                  <a href="#" class="flex p-4 hover:bg-gray-50">
                    <div class="flex-shrink-0 mr-3">
                      <div
                        class="w-8 h-8 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"
                          />
                          <path
                            fill-rule="evenodd"
                            d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-800">New Assignment Graded</p>
                      <p class="text-xs text-gray-500">1 hour ago</p>
                    </div>
                  </a>
                  <a href="#" class="flex p-4 hover:bg-gray-50">
                    <div class="flex-shrink-0 mr-3">
                      <div
                        class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M18 5v8a2 2 0 01-2 2h-5l-5 4v-4H4a2 2 0 01-2-2V5a2 2 0 012-2h12a2 2 0 012 2zM7 8H5v2h2V8zm2 0h2v2H9V8zm6 0h-2v2h2V8z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-800">
                        Parent Message Received
                      </p>
                      <p class="text-xs text-gray-500">3 hours ago</p>
                    </div>
                  </a>
                </div>
              </div>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Mr. David</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                    clip-rule="evenodd"
                  />
                </svg>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="teacher_profile.html"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >My Profile</a
                >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="examsPage"
        >
          <div class="max-w-7xl mx-auto">
            <div
              class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4"
            >
              <h1 class="text-2xl font-semibold text-gray-900">Manage Exams</h1>
              <div
                class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto"
              >
                <select
                  x-model="classFilter"
                  class="w-full sm:w-auto rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                >
                  <option value="all">All Classes</option>
                  <option value="10A">Class 10-A (Math)</option>
                  <option value="10B">Class 10-B (Math)</option>
                  <option value="11A">Class 11-A (Physics)</option>
                </select>

                <a
                  href="exam_form.html"
                  class="w-full sm:w-auto justify-center flex items-center px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                >
                  <svg
                    class="w-5 h-5 mr-2"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
                    />
                  </svg>
                  Create New Exam
                </a>
              </div>
            </div>

            <div class="border-b border-gray-200 mb-6">
              <nav class="-mb-px flex flex-wrap space-x-6" aria-label="Tabs">
                <button
                  @click="activeTab = 'Upcoming'"
                  :class="{ 'border-primary text-primary': activeTab === 'Upcoming', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'Upcoming' }"
                  class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                >
                  Upcoming
                </button>
                <button
                  @click="activeTab = 'Pending Grades'"
                  :class="{ 'border-primary text-primary': activeTab === 'Pending Grades', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'Pending Grades' }"
                  class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                >
                  Pending Grades
                </button>
                <button
                  @click="activeTab = 'Completed'"
                  :class="{ 'border-primary text-primary': activeTab === 'Completed', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'Completed' }"
                  class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                >
                  Completed & Published
                </button>
                <button
                  @click="activeTab = 'Draft'"
                  :class="{ 'border-primary text-primary': activeTab === 'Draft', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'Draft' }"
                  class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                >
                  Drafts
                </button>
              </nav>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              <template x-for="exam in filteredExams" :key="exam.id">
                <div
                  class="bg-white rounded-lg shadow-sm flex flex-col overflow-hidden"
                >
                  <div class="p-5 flex-grow">
                    <div class="flex justify-between items-start mb-3">
                      <span
                        class="text-sm font-semibold text-primary"
                        x-text="exam.class"
                      ></span>
                      <span
                        class="text-xs font-semibold px-2.5 py-0.5 rounded-full"
                        :class="{
                                        'bg-blue-100 text-blue-800': exam.status === 'Upcoming',
                                        'bg-yellow-100 text-yellow-800': exam.status === 'Pending Grades',
                                        'bg-green-100 text-green-800': exam.status === 'Completed',
                                        'bg-gray-100 text-gray-800': exam.status === 'Draft'
                                    }"
                        x-text="exam.status"
                      >
                      </span>
                    </div>
                    <h3
                      class="text-lg font-bold text-gray-900 mb-3 truncate"
                      x-text="exam.title"
                    ></h3>
                    <div class="space-y-2 text-sm text-gray-600">
                      <div class="flex items-center">
                        <svg
                          class="w-4 h-4 mr-2 text-gray-400"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        <span class="font-medium" x-text="exam.date"></span>
                      </div>
                      <div class="flex items-center">
                        <svg
                          class="w-4 h-4 mr-2 text-gray-400"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.414-1.415L11 9.586V6z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        <span x-text="exam.time"></span>
                      </div>
                      <div class="flex items-center">
                        <svg
                          class="w-4 h-4 mr-2 text-gray-400"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M9.69 18.933l.003.001C9.89 19.02 10 19 10 19s.11.02.308-.066l.002-.001.006-.003.018-.008a5.741 5.741 0 00.281-.149V17.05a2.997 2.997 0 01-.181.024l-.007.001-.004.001h-.002a2.003 2.003 0 01-.64 0h-.003l-.003-.001-.008-.001A2.997 2.997 0 018.95 17.05v1.78a5.74 5.74 0 00.28.149l.019.008.006.003zM10 15a1 1 0 011 1v1.05A5.712 5.712 0 0013.99 15.6l.01-.003.01-.004a.998.998 0 00.118-.088 1 1 0 111.7.734l-.004.001a.997.997 0 00-.118.088l-.01.004-.01.003A5.712 5.712 0 0011 17.05V18a1 1 0 11-2 0v-.95A5.712 5.712 0 006.01 15.6l-.01-.003-.01-.004a.998.998 0 00-.118-.088 1 1 0 111.7-.734l.004.001a.997.997 0 00.118.088l.01.004.01.003A5.712 5.712 0 009 17.05V16a1 1 0 011-1z"
                            clip-rule="evenodd"
                          />
                          <path
                            d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z"
                          />
                        </svg>
                        <span x-text="exam.room"></span>
                      </div>
                    </div>
                  </div>
                  <div
                    class="border-t border-gray-200 px-5 py-3 flex justify-end space-x-2"
                  >
                    <a
                      :href="`exam_form.html?id=${exam.id}`"
                      class="px-3 py-1 bg-white border border-gray-300 text-gray-700 text-xs font-medium rounded-md shadow-sm hover:bg-gray-50"
                      x-show="exam.status === 'Upcoming' || exam.status === 'Draft' || exam.status === 'Completed'"
                      >Manage</a
                    >
                    <a
                      :href="`grade_exam.html?id=${exam.id}`"
                      class="px-3 py-1 bg-primary text-white text-xs font-medium rounded-md shadow-sm hover:bg-primary-hover"
                      x-show="exam.status === 'Pending Grades'"
                      >Enter Grades</a
                    >
                    <a
                      :href="`grade_exam.html?id=${exam.id}`"
                      class="px-3 py-1 bg-white border border-gray-300 text-gray-700 text-xs font-medium rounded-md shadow-sm hover:bg-gray-50"
                      x-show="exam.status === 'Completed'"
                      >View Results</a
                    >
                  </div>
                </div>
              </template>

              <template x-if="filteredExams.length === 0">
                <div
                  class="md:col-span-2 lg:col-span-3 text-center text-gray-500 py-16"
                >
                  <svg
                    class="mx-auto h-12 w-12 text-gray-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"
                    />
                  </svg>
                  <h3 class="mt-2 text-sm font-semibold text-gray-900">
                    No exams found
                  </h3>
                  <p class="mt-1 text-sm text-gray-500">
                    Your filters returned no results. Try selecting a different
                    tab or class.
                  </p>
                </div>
              </template>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function examsPage() {
        return {
          classFilter: "all",
          activeTab: "Upcoming",
          exams: [
            {
              id: 1,
              title: "Midterm Exam",
              class: "10A",
              date: "Dec 20, 2023",
              time: "09:00 AM - 11:00 AM",
              room: "Hall A-01",
              status: "Upcoming",
            },
            {
              id: 2,
              title: "Chapter 5 Quiz",
              class: "10B",
              date: "Dec 18, 2023",
              time: "10:00 AM - 10:30 AM",
              room: "Room 204",
              status: "Upcoming",
            },
            {
              id: 3,
              title: "Optics Written Test",
              class: "11A",
              date: "Dec 05, 2023",
              time: "01:00 PM - 02:00 PM",
              room: "Lab 3",
              status: "Pending Grades",
            },
            {
              id: 4,
              title: "Calculus Final",
              class: "10A",
              date: "Dec 01, 2023",
              time: "09:00 AM - 11:00 AM",
              room: "Hall A-01",
              status: "Completed",
            },
            {
              id: 5,
              title: "Mechanics Problem Set",
              class: "11A",
              date: "Dec 02, 2023",
              time: "N/A",
              room: "N/A",
              status: "Completed",
            },
            {
              id: 6,
              title: "Final Exam (Draft)",
              class: "10B",
              date: "TBD",
              time: "TBD",
              room: "TBD",
              status: "Draft",
            },
          ],
          get filteredExams() {
            let filtered = this.exams;

            // Filter by Tab
            if (this.activeTab !== "all") {
              filtered = filtered.filter(
                (exam) => exam.status === this.activeTab
              );
            }

            // Filter by Class
            if (this.classFilter !== "all") {
              filtered = filtered.filter(
                (exam) => exam.class === this.classFilter
              );
            }

            return filtered;
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("examsPage", examsPage);
      });
    </script>
  </body>
