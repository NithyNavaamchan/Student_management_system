      <div

        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"

            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"

              viewBox="0 0 24 24"
              stroke-width="1.5"

                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <div class="hidden md:flex items-center">
            <svg
              class="w-6 h-6 text-primary"
              xmlns="http://www.w3.org/2000/svg"

            <h2 class="ml-2 text-lg font-semibold text-gray-800">
              Student Management System
            </h2>
          </div>
          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"

                <span

                ></span>
              </button>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Mr. David</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"

                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="teacher_profile.html"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >My Profile</a
                >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="assignmentCreatePage()"
        >
          <div class="max-w-7xl mx-auto">
            <div class="mb-6">
              <a
                href="teacher_assignments.html"
                class="inline-flex items-center text-sm font-medium text-gray-600 hover:text-gray-800 mb-2"
              >
                <svg
                  class="w-5 h-5 mr-1"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M12.79 5.23a.75.75 0 010 1.06L9.06 10l3.73 3.71a.75.75 0 11-1.06 1.06l-4.25-4.25a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 0z"
                    clip-rule="evenodd"
                  />
                </svg>
                Back to Assignments
              </a>
              <h1 class="text-2xl font-semibold text-gray-900">
                Create New Assignment
              </h1>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <div>
                    <label
                      for="title"
                      class="block text-sm font-medium text-gray-700"
                      >Title</label
                    >
                    <input
                      type="text"
                      id="title"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                      placeholder="e.g., Lab Report: Optics"
                    />
                  </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <label
                    for="instructions"
                    class="block text-sm font-medium text-gray-700"
                    >Instructions</label
                  >

                  <div
                    class="mt-1 border border-gray-300 rounded-t-md p-2 flex items-center space-x-2 bg-gray-50"
                  >
                    <button
                      type="button"
                      class="p-1 rounded text-gray-500 hover:bg-gray-200"
                    >
                      <svg
                        class="w-5 h-5"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M8.5 3a.5.5 0 01.5.5v2.5h2.5a.5.5 0 010 1h-2.5V9.5a.5.5 0 01-1 0V7H6a.5.5 0 010-1h2.5V3.5a.5.5 0 01.5-.5zM6.16 11.47a.75.75 0 00-1.06-1.06l-3.32 3.32a.75.75 0 000 1.06l3.32 3.32a.75.75 0 101.06-1.06L3.28 15.5l2.88-2.88-1.1-1.14zM13.84 11.47a.75.75 0 011.06-1.06l3.32 3.32a.75.75 0 010 1.06l-3.32 3.32a.75.75 0 11-1.06-1.06L16.72 15.5l-2.88-2.88 1.1-1.14z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </button>
                    <button
                      type="button"
                      class="p-1 rounded text-gray-500 hover:bg-gray-200"
                    >
                      <svg
                        class="w-5 h-5"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M10 3a.75.75 0 01.75.75v10.5a.75.75 0 01-1.5 0V3.75A.75.75 0 0110 3zM8.28 5.22a.75.75 0 00-1.06 1.06l-2.25 2.25a.75.75 0 000 1.06l2.25 2.25a.75.75 0 001.06-1.06L6.56 9.5l1.72-1.72a.75.75 0 000-1.06l-1.72-1.72L8.28 5.22zM11.72 5.22a.75.75 0 011.06 1.06l1.72 1.72a.75.75 0 010 1.06l-1.72 1.72-1.72-1.72a.75.75 0 010-1.06l2.25-2.25a.75.75 0 010-1.06l-2.25-2.25a.75.75 0 01-1.06-1.06z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </button>
                    <button
                      type="button"
                      class="p-1 rounded text-gray-500 hover:bg-gray-200"
                    >
                      <svg
                        class="w-5 h-5"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M3 4.75A.75.75 0 013.75 4h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 4.75zM3 9.75A.75.75 0 013.75 9h12.5a.75.75 0 010 1.5H3.75A.75.75 0 013 9.75zM3.75 14a.75.75 0 000 1.5h12.5a.75.75 0 000-1.5H3.75z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </button>
                    <button
                      type="button"
                      class="p-1 rounded text-gray-500 hover:bg-gray-200"
                    >
                      <svg
                        class="w-5 h-5"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M6.36 3.577a.75.75 0 01.63 1.258l-1.78 3.561a.75.75 0 01-1.259-.63L5.73 4.205a.75.75 0 01.63-1.258l-1.78 3.56A.75.75 0 013.32 6.87l-1.78-3.56a.75.75 0 01.63-1.258l3.19 1.595zM12.63 3.577a.75.75 0 00-1.26 1.258l1.78 3.56a.75.75 0 001.26-.63l-1.78-3.56zM6.43 11.23a.75.75 0 011.05-1.05l2.27 2.27 2.27-2.27a.75.75 0 011.05 1.05l-2.27 2.27 2.27 2.27a.75.75 0 11-1.05 1.05l-2.27-2.27-2.27 2.27a.75.75 0 01-1.05-1.05l2.27-2.27-2.27-2.27z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </button>
                  </div>
                  <textarea
                    id="instructions"
                    rows="10"
                    class="mt-0 block w-full rounded-b-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                    placeholder="Add detailed instructions for your students..."
                  ></textarea>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <label class="block text-sm font-medium text-gray-700"
                    >Attachments</label
                  >
                  <div
                    class="mt-2 flex justify-center rounded-md border-2 border-dashed border-gray-300 px-6 pt-5 pb-6"
                  >
                    <div class="space-y-1 text-center">
                      <svg
                        class="mx-auto h-12 w-12 text-gray-400"
                        stroke="currentColor"
                        fill="none"
                        viewBox="0 0 48 48"
                        aria-hidden="true"
                      >
                        <path
                          d="M28 8H12a4 4 0 00-4 4v20m32-12v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        ></path>
                      </svg>
                      <div class="flex text-sm text-gray-600">
                        <label
                          for="file-upload"
                          class="relative cursor-pointer rounded-md bg-white font-medium text-primary hover:text-primary-hover focus-within:outline-none"
                        >
                          <span>Upload a file</span>
                          <input
                            id="file-upload"
                            name="file-upload"
                            type="file"
                            class="sr-only"
                            multiple
                          />
                        </label>
                        <p class="pl-1">or drag and drop</p>
                      </div>
                      <p class="text-xs text-gray-500">
                        PDF, DOCX, PNG, JPG up to 10MB
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <button
                    type="button"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary"
                  >
                    Assign
                  </button>
                  <button
                    type="button"
                    class="mt-3 w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary"
                  >
                    Save as Draft
                  </button>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm space-y-4">
                  <div
                    x-data="{ open: false, selectedClasses: [], classes: ['Class 10-A', 'Class 10-B', 'Class 11-A'] }"
                  >
                    <label class="block text-sm font-medium text-gray-700"
                      >Assign to</label
                    >
                    <div class="relative mt-1">
                      <button
                        @click="open = !open"
                        type="button"
                        class="relative w-full cursor-default rounded-md border border-gray-300 bg-white py-2 pl-3 pr-10 text-left shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary sm:text-sm"
                      >
                        <span
                          class="block truncate"
                          x-text="selectedClasses.length > 0 ? selectedClasses.join(', ') : 'Select classes...'"
                        ></span>
                        <span
                          class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2"
                        >
                          <svg
                            class="h-5 w-5 text-gray-400"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                          >
                            <path
                              fill-rule="evenodd"
                              d="M10 3a.75.75 0 01.53.22l3.5 3.5a.75.75 0 01-1.06 1.06L10 4.81 6.53 8.28a.75.75 0 01-1.06-1.06l3.5-3.5A.75.75 0 0110 3zm-3.72 9.28a.75.75 0 011.06 0L10 15.19l3.47-3.47a.75.75 0 111.06 1.06l-4 4a.75.75 0 01-1.06 0l-4-4a.75.75 0 010-1.06z"
                              clip-rule="evenodd"
                            />
                          </svg>
                        </span>
                      </button>
                      <ul
                        x-show="open"
                        @click.away="open = false"
                        x-transition
                        x-cloak
                        class="absolute z-10 mt-1 max-h-60 w-full overflow-auto rounded-md bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm"
                      >
                        <template x-for="c in classes" :key="c">
                          <li
                            class="relative cursor-default select-none py-2 pl-3 pr-9 text-gray-900 hover:bg-gray-100"
                          >
                            <label class="flex items-center space-x-3">
                              <input
                                type="checkbox"
                                :value="c"
                                x-model="selectedClasses"
                                class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary"
                              />
                              <span
                                class="block truncate"
                                :class="selectedClasses.includes(c) ? 'font-semibold' : 'font-normal'"
                                x-text="c"
                              ></span>
                            </label>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </div>

                  <div>
                    <label
                      for="submission-type"
                      class="block text-sm font-medium text-gray-700"
                      >Submission Type</label
                    >
                    <select
                      id="submission-type"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                    >
                      <option>Online (File Upload)</option>
                      <option>On Paper (No Submission)</option>
                      <option>Text Entry</option>
                    </select>
                  </div>

                  <div>
                    <label
                      for="points"
                      class="block text-sm font-medium text-gray-700"
                      >Points</label
                    >
                    <input
                      type="number"
                      id="points"
                      value="100"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                    />
                  </div>

                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label
                        for="due-date"
                        class="block text-sm font-medium text-gray-700"
                        >Due Date</label
                      >
                      <input
                        type="date"
                        id="due-date"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                      />
                    </div>
                    <div>
                      <label
                        for="due-time"
                        class="block text-sm font-medium text-gray-700"
                        >Due Time</label
                      >
                      <input
                        type="time"
                        id="due-time"
                        value="23:59"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                      />
                    </div>
                  </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm space-y-4">
                  <h4 class="text-sm font-medium text-gray-900">Publishing</h4>
                  <fieldset class="space-y-4">
                    <div>
                      <label class="flex items-center">
                        <input
                          type="radio"
                          x-model="scheduleAction"
                          value="immediate"
                          name="schedule"
                          class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                        />
                        <span class="ml-3 block text-sm text-gray-700"
                          >Publish Immediately</span
                        >
                      </label>
                    </div>
                    <div>
                      <label class="flex items-center">
                        <input
                          type="radio"
                          x-model="scheduleAction"
                          value="later"
                          name="schedule"
                          class="h-4 w-4 border-gray-300 text-primary focus:ring-primary"
                        />
                        <span class="ml-3 block text-sm text-gray-700"
                          >Schedule for Later</span
                        >
                      </label>
                    </div>

                    <div
                      x-show="scheduleAction === 'later'"
                      x-transition
                      class="grid grid-cols-2 gap-4 pl-7"
                    >
                      <div>
                        <label
                          for="publish-date"
                          class="block text-xs font-medium text-gray-500"
                          >Publish Date</label
                        >
                        <input
                          type="date"
                          id="publish-date"
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                        />
                      </div>
                      <div>
                        <label
                          for="publish-time"
                          class="block text-xs font-medium text-gray-500"
                          >Publish Time</label
                        >
                        <input
                          type="time"
                          id="publish-time"
                          value="09:00"
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                        />
                      </div>
                    </div>
                  </fieldset>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function assignmentCreatePage() {
        return {
          scheduleAction: "immediate",
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("assignmentCreatePage", assignmentCreatePage);
      });
    </script>
  </body>
</html>
