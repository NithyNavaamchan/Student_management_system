<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      x-data="assignmentViewPage()"
      x-init="loadAssignmentData()"
      x-text="`View: ${assignment.title}`"
    >
      View Assignment
    </title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <style>
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
      /* For rendering instructions */
      .prose {
        color: #374151; /* text-gray-700 */
      }
      .prose p {
        margin-top: 1em;
        margin-bottom: 1em;
      }
      .prose ul {
        list-style-type: disc;
        margin-left: 1.5em;
      }
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <div

      class="flex h-screen bg-gray-100"
    >
      <aside

        <div class="h-24 flex items-center justify-center border-b">
          <div class="flex flex-col items-center text-center p-4">
            <img
              class="h-14 w-14 rounded-full"
              src="https://placehold.co/100x100/C7D2FE/4338CA?text=MD"
              alt="Mr. David"
            />
            <h3 class="text-sm font-semibold text-gray-800 mt-2">Mr. David</h3>
            <span class="text-xs text-gray-500">Teacher ID: TCH10023</span>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto">
          <ul class="py-4">
            <li class="px-4">
              <a
                href="teacher_dashboard.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"

                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"

            </li>

                <span class="ml-3 font-medium">Resources</span>

            </li>
            <li class="px-4 mt-2">
              <a
                href="teacher_timetable.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"

        </nav>
      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <div class="hidden md:flex items-center">
            <svg
              class="w-6 h-6 text-primary"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"
              />
              <path
                d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"
              />
              <path
                d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
              />
            </svg>
            <h2 class="ml-2 text-lg font-semibold text-gray-800">
              Student Management System
            </h2>
          </div>
          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
                <span
                  class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"
                ></span>
              </button>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Mr. David</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                    clip-rule="evenodd"
                  />
                </svg>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="teacher_profile.html"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >My Profile</a
                >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="assignmentViewPage()"
          x-init="loadAssignmentData()"
        >
          <div class="max-w-7xl mx-auto">
            <div class="mb-6">
              <a
                href="teacher_assignments.html"
                class="inline-flex items-center text-sm font-medium text-gray-600 hover:text-gray-800 mb-2"
              >
                <svg
                  class="w-5 h-5 mr-1"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M12.79 5.23a.75.75 0 010 1.06L9.06 10l3.73 3.71a.75.75 0 11-1.06 1.06l-4.25-4.25a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 0z"
                    clip-rule="evenodd"
                  />
                </svg>
                Back to Assignments
              </a>
              <div
                class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
              >
                <h1
                  class="text-2xl font-semibold text-gray-900"
                  x-text="assignment.title"
                ></h1>
                <div class="flex-shrink-0 flex items-center gap-2">
                  <a
                    :href="`edit_assignment.html?id=${assignment.id}`"
                    class="inline-flex items-center px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                  >
                    Edit
                  </a>
                  <a
                    :href="`grade_assignment.html?id=${assignment.id}`"
                    class="inline-flex items-center px-4 py-2 bg-white text-gray-700 border border-gray-300 text-sm font-medium rounded-lg shadow-sm hover:bg-gray-50"
                  >
                    <span
                      x-text="assignment.status === 'Graded' ? 'View Grades' : 'Grade Assignment'"
                    ></span>
                  </a>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <h3 class="text-lg font-medium text-gray-900 mb-4">
                    Instructions
                  </h3>
                  <p
                    class="text-gray-700 whitespace-pre-wrap prose"
                    x-text="assignment.instructions"
                  ></p>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <h3 class="text-lg font-medium text-gray-900 mb-4">
                    Attachments
                  </h3>
                  <ul class="space-y-2">
                    <li
                      class="flex items-center justify-between p-3 bg-gray-50 rounded-md"
                    >
                      <div class="flex items-center">
                        <svg
                          class="w-6 h-6 text-gray-500 mr-3"
                          xmlns="http://www.w3.org/2000/svg"
                          fill="none"
                          viewBox="0 0 24 24"
                          stroke-width="1.5"
                          stroke="currentColor"
                        >
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94a3 3 0 114.243 4.242l-9.879 9.879a1.5 1.5 0 01-2.121-2.121l7.693-7.693a.75.75 0 011.06 1.06l-7.693 7.693a.75.75 0 000 1.06l9.879-9.879a1.5 1.5 0 10-2.121-2.121L6.464 15.858a3 3 0 004.243 4.243l7.693-7.693a.75.75 0 011.06-1.06l-7.693 7.693z"
                          />
                        </svg>
                        <span class="text-sm font-medium text-gray-800"
                          >calculus_worksheet.pdf</span
                        >
                      </div>
                      <a
                        href="#"
                        class="text-sm font-medium text-primary hover:underline"
                        >Download</a
                      >
                    </li>
                  </ul>
                </div>
              </div>

              <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm space-y-4">
                  <h3 class="text-lg font-medium text-gray-900 mb-2">
                    Details
                  </h3>

                  <div class="flex justify-between py-2 border-b">
                    <span class="text-sm font-medium text-gray-500"
                      >Status</span
                    >
                    <span
                      class="text-sm font-semibold"
                      :class="{
                                'text-green-600': assignment.status === 'Graded',
                                'text-yellow-600': assignment.status === 'Needs Grading',
                                'text-gray-600': assignment.status === 'Draft'
                              }"
                      x-text="assignment.status"
                    ></span>
                  </div>
                  <div class="flex justify-between py-2 border-b">
                    <span class="text-sm font-medium text-gray-500">Class</span>
                    <span
                      class="text-sm text-gray-800"
                      x-text="assignment.classes.join(', ')"
                    ></span>
                  </div>
                  <div class="flex justify-between py-2 border-b">
                    <span class="text-sm font-medium text-gray-500"
                      >Due Date</span
                    >
                    <span
                      class="text-sm text-gray-800"
                      x-text="`${assignment.dueDate} at ${assignment.dueTime}`"
                    ></span>
                  </div>
                  <div class="flex justify-between py-2 border-b">
                    <span class="text-sm font-medium text-gray-500"
                      >Points</span
                    >
                    <span
                      class="text-sm text-gray-800"
                      x-text="assignment.points"
                    ></span>
                  </div>
                  <div class="flex justify-between py-2">
                    <span class="text-sm font-medium text-gray-500"
                      >Submission Type</span
                    >
                    <span
                      class="text-sm text-gray-800"
                      x-text="assignment.submissionType"
                    ></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function assignmentViewPage() {
        return {
          assignment: {
            id: null,
            title: "Loading...",
            instructions: "",
            status: "",
            classes: [],
            points: 0,
            dueDate: "",
            dueTime: "",
          }, // Empty object to be filled

          loadAssignmentData() {
            // --- MOCK DATA ---
            // In a real app, you'd fetch this from your server
            const urlParams = new URLSearchParams(window.location.search);
            const assignmentId = urlParams.get("id") || "1"; // Default to ID 1 if none provided

            const mockData = {
              1: {
                id: 1,
                title: "Calculus Problem Set",
                instructions:
                  "Please complete all problems on the attached worksheet.\n\nShow your work for full credit.\nSubmissions must be a single PDF file.",
                status: "Needs Grading",
                classes: ["Class 10-A"],
                points: 100,
                dueDate: "Dec 10, 2023",
                dueTime: "11:59 PM",
                submissionType: "Online (File Upload)",
              },
              5: {
                id: 5,
                title: "Final Exam Study Guide",
                instructions:
                  "Here is the study guide. Please review all topics for the upcoming final exam.",
                status: "Draft",
                classes: ["Class 11-A"],
                points: 50,
                dueDate: "Dec 15, 2023",
                dueTime: "11:59 PM",
                submissionType: "On Paper (No Submission)",
              },
              default: {
                id: 0,
                title: "Assignment Not Found",
                instructions: "Could not load assignment details.",
                status: "Error",
                classes: ["N/A"],
                points: 0,
                dueDate: "N/A",
                dueTime: "N/A",
                submissionType: "N/A",
              },
            };
            // --- END MOCK DATA ---

            this.assignment = mockData[assignmentId] || mockData["default"];
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("assignmentViewPage", assignmentViewPage);
      });
    </script>
  </body>
</html>
