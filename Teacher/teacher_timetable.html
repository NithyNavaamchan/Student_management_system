<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Timetable</title>

    <!-- Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!-- Custom Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
            gridTemplateRows: {
              // Custom grid for the 8am-5pm timetable
              timetable: "auto repeat(9, minmax(60px, 1fr))",
            },
          },
        },
      };
    </script>

    <!-- Alpine.js -->
    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <style>
      /* Simple scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }

      /* Custom grid-row-span utilities for timetable slots */
      .row-span-1 {
        grid-row: span 1 / span 1;
      }
      .row-span-2 {
        grid-row: span 2 / span 2;
      }
      .row-span-3 {
        grid-row: span 3 / span 3;
      }

      .row-start-1 {
        grid-row-start: 1;
      }
      .row-start-2 {
        grid-row-start: 2;
      }
      .row-start-3 {
        grid-row-start: 3;
      }
      .row-start-4 {
        grid-row-start: 4;
      }
      .row-start-5 {
        grid-row-start: 5;
      }
      .row-start-6 {
        grid-row-start: 6;
      }
      .row-start-7 {
        grid-row-start: 7;
      }
      .row-start-8 {
        grid-row-start: 8;
      }
      .row-start-9 {
        grid-row-start: 9;
      }
      .row-start-10 {
        grid-row-start: 10;
      }
    </style>
  </head>

      <!-- Main content -->

        <!-- Main content area -->
        <!-- 
          ==================================================
          == THIS IS THE CORRECTED LINE (parentheses removed + x-init added)
          ==================================================
        -->
        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="timetablePage"
          x-init="setActiveDay()"
        >
          <div class="max-w-7xl mx-auto">
            <!-- Page Header -->
            <div
              class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4"
            >
              <h1 class="text-2xl font-semibold text-gray-900">My Timetable</h1>
              <div class="flex items-center gap-4 w-full md:w-auto">
                <!-- Class Filter -->
                <label
                  for="classFilter"
                  class="text-sm font-medium text-gray-700"
                  >Class:</label
                >
                <select
                  id="classFilter"
                  x-model="classFilter"
                  class="w-full sm:w-auto rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                >
                  <option value="all">All My Classes</option>
                  <option value="10A">Class 10-A (Math)</option>
                  <option value="10B">Class 10-B (Math)</option>
                  <option value="11A">Class 11-A (Physics)</option>
                </select>
              </div>
            </div>

            <!-- Mobile Day Selector -->
            <div class="sm:hidden mb-4">
              <label for="activeDay" class="sr-only">Select a day</label>
              <select
                id="activeDay"
                x-model="activeDay"
                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary"
              >
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
              </select>
            </div>

            <!-- Timetable Container -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
              <!-- Desktop Timetable -->
              <div
                class="hidden sm:grid sm:grid-cols-6 sm:grid-rows-timetable divide-x divide-gray-200"
              >
                <!-- Header Row -->
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-500 bg-gray-50 text-right"
                >
                  Time
                </div>
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-800 bg-gray-50 text-center"
                >
                  Monday
                </div>
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-800 bg-gray-50 text-center"
                >
                  Tuesday
                </div>
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-800 bg-gray-50 text-center"
                >
                  Wednesday
                </div>
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-800 bg-gray-50 text-center"
                >
                  Thursday
                </div>
                <div
                  class="px-4 py-3 text-sm font-semibold text-gray-800 bg-gray-50 text-center"
                >
                  Friday
                </div>

                <!-- Time Slots Column -->
                <template x-for="timeBlock in timeSlots" :key="timeBlock.start">
                  <div
                    class="px-4 py-3 text-xs font-semibold text-gray-500 text-right border-t border-gray-200"
                    x-text="timeBlock.label"
                  ></div>
                </template>

                <!-- Empty Cells for Grid Background -->
                <template x-for="i in 45">
                  <!-- 9 time slots * 5 days -->
                  <div class="border-t border-gray-200"></div>
                </template>

                <!-- Event Cards -->
                <template x-for="event in filteredSchedule" :key="event.id">
                  <div
                    class="p-2 m-1 rounded-lg shadow text-xs"
                    :class="[event.color, getEventPosition(event)]"
                  >
                    <p class="font-bold" x-text="event.subject"></p>
                    <p x-text="`Class: ${event.class}`"></p>
                    <p x-text="`Room: ${event.room}`"></p>
                    <p
                      class="mt-1"
                      x-text="`${event.startTime} - ${event.endTime}`"
                    ></p>
                  </div>
                </template>
              </div>

              <!-- Mobile Timetable -->
              <div class="sm:hidden">
                <template x-for="timeBlock in timeSlots" :key="timeBlock.start">
                  <div class="grid grid-cols-4 border-t border-gray-200">
                    <!-- Time -->
                    <div
                      class="px-3 py-4 text-xs font-semibold text-gray-500 text-right"
                    >
                      <span x-text="timeBlock.label"></span>
                    </div>
                    <!-- Event -->
                    <div class="col-span-3 border-l border-gray-200 p-2">
                      <template
                        x-if="getEventForDay(activeDay, timeBlock.start)"
                      >
                        <div
                          class="p-3 rounded-lg shadow text-sm w-full"
                          :class="getEventForDay(activeDay, timeBlock.start).color"
                        >
                          <p
                            class="font-bold"
                            x-text="getEventForDay(activeDay, timeBlock.start).subject"
                          ></p>
                          <p
                            x-text="`Class: ${getEventForDay(activeDay, timeBlock.start).class}`"
                          ></p>
                          <p
                            x-text="`Room: ${getEventForDay(activeDay, timeBlock.start).room}`"
                          ></p>
                          <p
                            class="mt-1 text-xs"
                            x-text="`${getEventForDay(activeDay, timeBlock.start).startTime} - ${getEventForDay(activeDay, timeBlock.start).endTime}`"
                          ></p>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- JavaScript Block -->
    <script>
      function timetablePage() {
        return {
          classFilter: "all",
          activeDay: "Monday", // For mobile view
          timeSlots: [
            { start: 8, label: "08:00 AM" },
            { start: 9, label: "09:00 AM" },

            return `${colMap[event.day]} ${rowMap[event.start]} ${
              durationMap[event.duration]
            }`;

          // Get event for mobile view
          getEventForDay(day, startHour) {
            return this.filteredSchedule.find(
              (event) => event.day === day && event.start === startHour
            );

          // Set active day for mobile to current day
          setActiveDay() {
            const today = new Date().toLocaleString("en-US", {
              weekday: "long",
            });
            const weekDays = [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
            ];
            if (weekDays.includes(today)) {
              this.activeDay = today;
            } else {
              this.activeDay = "Monday"; // Default to Monday if weekend
            }
