<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      /* Simple scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <div
      x-data="{ sidebarOpen: window.innerWidth > 1024, profileOpen: false, notificationOpen: false }"
      class="flex h-screen bg-gray-100"
    >
      <div
        x-show="sidebarOpen"
        @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/50 z-30 lg:hidden"
        x-cloak
      ></div>

      <aside
        class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col bg-white border-r transition-transform duration-300 transform"
        :class="{ '-translate-x-full': !sidebarOpen, 'translate-x-0': sidebarOpen }"
      >
        <div class="h-24 flex items-center justify-center border-b">
          <div class="flex flex-col items-center text-center p-4">
            <img
              class="h-14 w-14 rounded-full"
              src="https://placehold.co/100x100/FEF3C7/9A3412?text=SJ"
              alt="Sarah Johnson"
            />
            <h3 class="text-sm font-semibold text-gray-800 mt-2">
              Sarah Johnson
            </h3>
            <span class="text-xs text-gray-500">Parent ID: PAR45678</span>
          </div>
        </div>

        <nav class="flex-1 overflow-y-auto">
          <ul class="py-4">
            <li class="px-4">
              <a
                href="parent_dashboard.html"
                class="flex items-center px-4 py-3 bg-primary text-white rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V17a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
                  />
                </svg>
                <span class="ml-3 font-medium">Dashboard</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="my_children.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"

                </svg>
                <span class="ml-3 font-medium">My Children</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_gradebook.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.004-.002l.004-.002l.003-.001l.002-.001l.002-.001L10.394 3.2l.002.001l.002.001l.003.001l.004.002l.004.002a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"
                  />
                  <path
                    d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"
                  />
                  <path
                    d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
                  />
                </svg>
                <span class="ml-3 font-medium">Gradebook</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_upcoming_work.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                  <path
                    fill-rule="evenodd"
                    d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                    clip-rule="evenodd"
                  />
                </svg>
                <span class="ml-3 font-medium">Upcoming Work</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_announcements.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10 3.5A1.5 1.5 0 0111.5 5v1.615a.75.75 0 00.416.678l.49.245a1.5 1.5 0 01.894 1.368V10.5A1.5 1.5 0 0113 12h-1.5a.75.75 0 00-.75.75v1.315a1.5 1.5 0 01-1.5 1.435h-1.5A1.5 1.5 0 016 14.065V12.75A.75.75 0 005.25 12H3.75a1.5 1.5 0 01-1.5-1.5V9.406a1.5 1.5 0 01.894-1.368l.49-.245A.75.75 0 004 7.115V5A1.5 1.5 0 015.5 3.5h3A1.5 1.5 0 0110 3.5zM8.5 5V3.5h-3A.5.5 0 005 4v3.115a2.25 2.25 0 01-1.342 2.052l-.49.245A.5.5 0 003 9.806V10.5a.5.5 0 00.5.5H5a.75.75 0 01.75.75v1.315a.5.5 0 00.5.485h1.5a.5.5 0 00.5-.485V12.75A.75.75 0 019 12h1.5a.5.5 0 00.5-.5V9.806a.5.5 0 00-.158-.399l-.49-.245a2.25 2.25 0 01-1.342-2.052V5h-1.5z"
                  />
                </svg>
                <span class="ml-3 font-medium">Announcements</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
        x-data="parentDashboard"
        x-init="init()"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>

          <div>
            <label for="activeChild" class="sr-only">Select Child</label>
            <select
              id="activeChild"
              x-model="activeChildId"
              @change="updateChildData()"
              class="block w-full sm:w-64 rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
            >
              <template x-for="child in children" :key="child.id">
                <option
                  :value="child.id"
                  x-text="`Viewing: ${child.name}`"
                ></option>
              </template>
            </select>
          </div>

          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
                <span
                  class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"
                ></span>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <div class="p-4 border-b">
                  <h3 class="font-semibold text-gray-800">Notifications</h3>
                </div>
                <div class="divide-y max-h-80 overflow-y-auto">
                  <a href="#" class="flex p-4 hover:bg-gray-50">
                    <div class="flex-shrink-0 mr-3">
                      <div
                        class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M18 5v8a2 2 0 01-2 2h-5l-5 4v-4H4a2 2 0 01-2-2V5a2 2 0 012-2h12a2 2 0 012 2zM7 8H5v2h2V8zm2 0h2v2H9V8zm6 0h-2v2h2V8z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-800">
                        Message from Mr. David
                      </p>
                      <p class="text-xs text-gray-500">1 day ago</p>
                    </div>
                  </a>
                </div>
              </div>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Sarah Johnson</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                    clip-rule="evenodd"
                  />
                </svg>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
        >
          <div class="max-w-7xl mx-auto">
            <div class="mb-6">
              <h1
                class="text-2xl font-semibold text-gray-900"
                x-text="`Welcome, Sarah! (Viewing ${activeChildData.name})`"
              ></h1>
              <span
                class="text-sm text-gray-500"
                x-data="{ newDate: new Date() }"
                x-text="newDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })"
              ></span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
              <div
                class="bg-white p-6 rounded-lg shadow-sm flex items-center space-x-4"
              >
                <div
                  class="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"
                >
                  <svg
                    class="w-6 h-6"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"
                    />
                    <path
                      d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"
                    />
                    <path
                      d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
                    />
                  </svg>
                </div>
                <div>
                  <span class="text-sm text-gray-500">Overall Grade</span>
                  <p
                    class="text-2xl font-bold text-gray-900"
                    x-text="activeChildData.overallGrade"
                  ></p>
                </div>
              </div>

              <div
                class="bg-white p-6 rounded-lg shadow-sm flex items-center space-x-4"
              >
                <div
                  class="flex-shrink-0 w-12 h-12 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center"
                >
                  <svg
                    class="w-6 h-6"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                    <path
                      fill-rule="evenodd"
                      d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                      clip-rule="evenodd"
                    />
                  </svg>
                </div>
                <div>
                  <span class="text-sm text-gray-500">Pending Assignments</span>
                  <p
                    class="text-2xl font-bold text-gray-900"
                    x-text="activeChildData.pendingAssignments"
                  ></p>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <h3 class="text-lg font-semibold text-gray-900 mb-2">
                    Recent Grades
                  </h3>
                  <ul class="divide-y divide-gray-200">
                    <template
                      x-for="grade in activeChildData.recentGrades"
                      :key="grade.title"
                    >
                      <li class="flex justify-between items-center py-3">
                        <div>
                          <p
                            class="text-sm font-medium text-gray-800"
                            x-text="grade.title"
                          ></p>
                          <p
                            class="text-sm text-gray-500"
                            x-text="grade.subject"
                          ></p>
                        </div>
                        <span
                          class="text-lg font-bold text-gray-900"
                          x-text="grade.grade"
                        ></span>
                      </li>
                    </template>
                    <template x-if="activeChildData.recentGrades.length === 0">
                      <li class="py-3 text-sm text-gray-500">
                        No recent grades have been posted.
                      </li>
                    </template>
                  </ul>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <h3 class="text-lg font-semibold text-gray-900 mb-4">
                    Upcoming Deadlines
                  </h3>
                  <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                      <thead class="bg-gray-50">
                        <tr>
                          <th
                            class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                          >
                            Item
                          </th>
                          <th
                            class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                          >
                            Subject
                          </th>
                          <th
                            class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                          >
                            Due Date
                          </th>
                        </tr>
                      </thead>
                      <tbody class="bg-white divide-y divide-gray-200">
                        <template
                          x-for="item in activeChildData.upcoming"
                          :key="item.title"
                        >
                          <tr>
                            <td
                              class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-800"
                              x-text="item.title"
                            ></td>
                            <td
                              class="px-4 py-3 whitespace-nowrap text-sm text-gray-600"
                              x-text="item.subject"
                            ></td>
                            <td
                              class="px-4 py-3 whitespace-nowrap text-sm text-gray-600"
                              x-text="item.due"
                            ></td>
                          </tr>
                        </template>
                        <template x-if="activeChildData.upcoming.length === 0">
                          <tr>
                            <td
                              colspan="3"
                              class="px-4 py-6 text-center text-sm text-gray-500"
                            >
                              No upcoming deadlines.
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                  <h3 class="text-lg font-semibold text-gray-900 mb-4">
                    Recent Announcements
                  </h3>
                  <ul class="space-y-4">
                    <template x-for="item in announcements" :key="item.id">
                      <li class="border-b pb-4 last:pb-0 last:border-b-0">
                        <p
                          class="text-sm font-medium text-gray-800"
                          x-text="item.title"
                        ></p>
                        <p class="text-xs text-gray-500" x-text="item.date"></p>
                      </li>
                    </template>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function parentDashboard() {
        return {
          children: [
            { id: "1", name: "Emily Johnson (Grade 10)" },
            { id: "2", name: "Michael Johnson (Grade 8)" },
          ],
          announcements: [
            {
              id: 1,
              title: "Parent-Teacher Meetings next week",
              date: "Dec 08, 2023",
            },
            { id: 2, title: "School closed for holiday", date: "Dec 06, 2023" },
            {
              id: 3,
              title: "Annual Sports Day on Friday",
              date: "Dec 04, 2023",
            },
          ],
          allChildData: {
            1: {
              name: "Emily Johnson",
              overallGrade: "A-",
              pendingAssignments: 2,
              recentGrades: [
                {
                  title: "Calculus Problem Set",
                  subject: "Mathematics",
                  grade: "92/100",
                },
                {
                  title: "Renaissance Essay",
                  subject: "World History",
                  grade: "A-",
                },
                {
                  title: "Optics Lab Report",
                  subject: "Physics",
                  grade: "88/100",
                },
              ],
              upcoming: [
                {
                  title: "History Essay",
                  subject: "World History",
                  due: "Dec 12, 2023",
                },
                {
                  title: "Physics Midterm",
                  subject: "Physics II",
                  due: "Dec 15, 2023",
                },
              ],
              teachers: [
                "Mr. David (Math)",
                "Ms. Frizzle (Physics)",
                "Mr. Gable (History)",
              ],
            },
            2: {
              name: "Michael Johnson",
              overallGrade: "B",
              pendingAssignments: 4,
              recentGrades: [
                { title: "Book Report", subject: "English", grade: "80/100" },
                { title: "Cell Diorama", subject: "Science", grade: "B+" },
                { title: "Sketching Final", subject: "Art", grade: "88/100" },
              ],
              upcoming: [
                {
                  title: "Science Fair Project",
                  subject: "Science",
                  due: "Dec 14, 2023",
                },
              ],
              teachers: [
                "Ms. Honey (English)",
                "Mr. Clarke (Science)",
                "Mrs. Pino (Art)",
              ],
            },
          },
          activeChildId: "1",
          activeChildData: {},
          scoresChart: null, // We keep this for the bar chart

          init() {
            this.activeChildData = this.allChildData[this.activeChildId];
            this.$nextTick(() => {
              this.initScoresChart();
            });
          },

          updateChildData() {
            this.activeChildData = this.allChildData[this.activeChildId];

            // Update Scores Chart
            this.scoresChart.data.labels =
              this.activeChildData.recentGrades.map((g) => g.subject);
            this.scoresChart.data.datasets[0].data =
              this.activeChildData.recentGrades.map((g) => {
                let score = parseInt(g.grade);
                if (isNaN(score)) {
                  // Handle letter grades
                  if (g.grade.startsWith("A")) return 95;
                  if (g.grade.startsWith("B")) return 85;
                  if (g.grade.startsWith("C")) return 75;
                  return 70;
                }
                return score;
              });
            this.scoresChart.update();
          },

          initScoresChart() {
            // Scores Bar Chart
            const ctxScores = document
              .getElementById("scoresChart")
              .getContext("2d");
            this.scoresChart = new Chart(ctxScores, {
              type: "bar",
              data: {
                labels: this.activeChildData.recentGrades.map((g) => g.subject),
                datasets: [
                  {
                    label: "Recent Scores",
                    data: this.activeChildData.recentGrades.map((g) => {
                      let score = parseInt(g.grade);
                      if (isNaN(score)) {
                        // Handle letter grades
                        if (g.grade.startsWith("A")) return 95;
                        if (g.grade.startsWith("B")) return 85;
                        if (g.grade.startsWith("C")) return 75;
                        return 70;
                      }
                      return score;
                    }),
                    backgroundColor: "rgba(79, 70, 229, 0.8)", // bg-primary
                    borderColor: "rgba(79, 70, 229, 1)",
                    borderWidth: 1,
                    borderRadius: 4,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                  y: {
                    beginAtZero: true,
                    max: 100,
                    grid: { color: "rgba(229, 231, 235, 0.5)" },
                  },
                  x: { grid: { display: false } },
                },
              },
            });
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("parentDashboard", parentDashboard);
      });
    </script>
  </body>
</html>
