                          viewBox="0 0 20 20"
                          fill="currentColor"

                    </div>

                </div>
              </div>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button

                class="flex items-center space-x-2"

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="upcomingWorkPage"
          @child-changed.window="changeChild($event.detail)"

          <div class="max-w-5xl mx-auto">
            <div
              class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4"
            >
              <div>
                <h1 class="text-2xl font-semibold text-gray-900">
                  Upcoming Work
                </h1>
                <p
                  class="text-sm text-gray-500 mt-1"
                  x-text="`Showing assignments and exams for ${currentChild.name}`"
                ></p>
              </div>

              <div class="flex gap-3 w-full sm:w-auto">
                <select
                  x-model="filterSubject"
                  class="block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                >
                  <option value="all">All Subjects</option>
                  <template
                    x-for="subject in currentChild.subjects"
                    :key="subject"
                  >
                    <option :value="subject" x-text="subject"></option>
                  </template>
                </select>
                <select
                  x-model="filterType"
                  class="block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                >
                  <option value="all">All Types</option>
                  <option value="Assignment">Assignments</option>
                  <option value="Exam">Exams</option>
                  <option value="Project">Projects</option>
                </select>
              </div>
            </div>

            <div class="space-y-8">
              <div x-show="groupedWork.overdue.length > 0" x-cloak>
                <h2
                  class="text-lg font-semibold text-red-600 mb-3 flex items-center"
                >
                  <svg
                    class="w-5 h-5 mr-2"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                      clip-rule="evenodd"
                    />
                  </svg>
                  Missing / Overdue
                </h2>
                <div class="space-y-3">
                  <template x-for="item in groupedWork.overdue" :key="item.id">
                    <div
                      class="bg-white border-l-4 border-red-500 rounded-r-lg shadow-sm p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center"
                    >
                      <div>
                        <div class="flex items-center gap-2 mb-1">
                          <span
                            class="text-xs font-bold px-2 py-0.5 rounded bg-red-100 text-red-700 uppercase tracking-wide"
                            x-text="item.type"
                          ></span>
                          <span
                            class="text-sm text-gray-500"
                            x-text="item.subject"
                          ></span>
                        </div>
                        <h3
                          class="text-lg font-bold text-gray-900"
                          x-text="item.title"
                        ></h3>
                        <p
                          class="text-sm text-red-600 font-medium mt-1"
                          x-text="`Due: ${item.dueDate}`"
                        ></p>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <div>
                <h2 class="text-lg font-semibold text-gray-900 mb-3">
                  Due This Week
                </h2>
                <div class="space-y-3">
                  <template x-for="item in groupedWork.thisWeek" :key="item.id">
                    <div
                      class="bg-white border-l-4 border-yellow-400 rounded-r-lg shadow-sm p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center hover:shadow-md transition-shadow"
                    >
                      <div>
                        <div class="flex items-center gap-2 mb-1">
                          <span
                            class="text-xs font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-600 uppercase tracking-wide"
                            x-text="item.type"
                          ></span>
                          <span
                            class="text-sm text-gray-500"
                            x-text="item.subject"
                          ></span>
                        </div>
                        <h3
                          class="text-base font-bold text-gray-900"
                          x-text="item.title"
                        ></h3>
                        <p class="text-sm text-gray-600 mt-1 flex items-center">
                          <svg
                            class="w-4 h-4 mr-1 text-gray-400"
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                          >
                            <path
                              fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.414-1.415L11 9.586V6z"
                              clip-rule="evenodd"
                            />
                          </svg>
                          <span x-text="item.dueDate"></span>
                        </p>
                      </div>
                      <div class="mt-3 sm:mt-0 flex items-center gap-2">
                        <span
                          class="text-sm font-medium text-yellow-600 bg-yellow-50 px-3 py-1 rounded-full"
                          >Due Soon</span
                        >
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="groupedWork.thisWeek.length === 0"
                    class="text-center py-8 bg-white rounded-lg border border-dashed border-gray-300"
                  >
                    <p class="text-gray-500 text-sm">
                      No work due this week! 🎉
                    </p>
                  </div>
                </div>
              </div>

              <div>
                <h2 class="text-lg font-semibold text-gray-900 mb-3">
                  Upcoming
                </h2>
                <div class="space-y-3">
                  <template x-for="item in groupedWork.upcoming" :key="item.id">
                    <div
                      class="bg-white border border-gray-200 rounded-lg shadow-sm p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center"
                    >
                      <div>
                        <div class="flex items-center gap-2 mb-1">
                          <span
                            class="text-xs font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-600 uppercase tracking-wide"
                            x-text="item.type"
                          ></span>
                          <span
                            class="text-sm text-gray-500"
                            x-text="item.subject"
                          ></span>
                        </div>
                        <h3
                          class="text-base font-medium text-gray-900"
                          x-text="item.title"
                        ></h3>
                        <p
                          class="text-sm text-gray-500 mt-1"
                          x-text="`Due: ${item.dueDate}`"
                        ></p>
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="groupedWork.upcoming.length === 0"
                    class="text-center py-8 bg-white rounded-lg border border-dashed border-gray-300"
                  >
                    <p class="text-gray-500 text-sm">
                      No upcoming work scheduled yet.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>

    <script>
      // Header Controller to dispatch events when child changes
      function headerController() {
        return {
          selectedChildId: "1",
          updateGlobalChild(id) {
            // Dispatch a custom event to notify other components
            window.dispatchEvent(
              new CustomEvent("child-changed", { detail: id })
            );
          },
        };
      }

      function upcomingWorkPage() {
        return {
          activeChildId: "1",
          filterSubject: "all",
          filterType: "all",

          // Database of all data
          db: {
            1: {
              // Emily
              name: "Emily Johnson",
              subjects: [
                "Mathematics",
                "World History",
                "Physics II",
                "Computer Science",
              ],
              work: [
                {
                  id: 1,
                  title: "Calculus Problem Set",
                  subject: "Mathematics",
                  type: "Assignment",
                  dueDate: "Tomorrow, 11:59 PM",
                  status: "week",
                },
                {
                  id: 2,
                  title: "Renaissance Essay Draft",
                  subject: "World History",
                  type: "Assignment",
                  dueDate: "Dec 12, 2023",
                  status: "week",
                },
