<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcements - Parent Portal</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <style>
      /* Simple scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <div
      x-data="{ sidebarOpen: window.innerWidth > 1024, profileOpen: false, notificationOpen: false }"
      class="flex h-screen bg-gray-100"
    >
      <div
        x-show="sidebarOpen"
        @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/50 z-30 lg:hidden"

      ></div>

      <aside
        class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col bg-white border-r transition-transform duration-300 transform"
        :class="{ '-translate-x-full': !sidebarOpen, 'translate-x-0': sidebarOpen }"
      >
        <div class="h-24 flex items-center justify-center border-b">
          <div class="flex flex-col items-center text-center p-4">
            <img
              class="h-14 w-14 rounded-full"
              src="https://placehold.co/100x100/FEF3C7/9A3412?text=SJ"
              alt="Sarah Johnson"
            />
            <h3 class="text-sm font-semibold text-gray-800 mt-2">
              Sarah Johnson
            </h3>
            <span class="text-xs text-gray-500">Parent ID: PAR45678</span>
          </div>
        </div>

        <nav class="flex-1 overflow-y-auto">
          <ul class="py-4">
            <li class="px-4">
              <a
                href="parent_dashboard.html"

              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >

                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V17a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"

                </svg>
                <span class="ml-3 font-medium">Dashboard</span>

            </li>
            <li class="px-4 mt-2">

            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_gradebook.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.004-.002l.004-.002l.003-.001l.002-.001l.002-.001L10.394 3.2l.002.001l.002.001l.003.001l.004.002l.004.002a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"

                <span class="ml-3 font-medium">Gradebook </span>
              </a>
            </li>

            <li class="px-4 mt-2">
              <a
                href="parent_upcoming_work.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                  <path
                    fill-rule="evenodd"
                    d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"

                <span class="ml-3 font-medium">Upcoming Work</span>

            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_announcements.html"
                class="flex items-center px-4 py-3 bg-primary text-white rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10 3.5A1.5 1.5 0 0111.5 5v1.615a.75.75 0 00.416.678l.49.245a1.5 1.5 0 01.894 1.368V10.5A1.5 1.5 0 0113 12h-1.5a.75.75 0 00-.75.75v1.315a1.5 1.5 0 01-1.5 1.435h-1.5A1.5 1.5 0 016 14.065V12.75A.75.75 0 005.25 12H3.75a1.5 1.5 0 01-1.5-1.5V9.406a1.5 1.5 0 01.894-1.368l.49-.245A.75.75 0 004 7.115V5A1.5 1.5 0 015.5 3.5h3A1.5 1.5 0 0110 3.5zM8.5 5V3.5h-3A.5.5 0 005 4v3.115a2.25 2.25 0 01-1.342 2.052l-.49.245A.5.5 0 003 9.806V10.5a.5.5 0 00.5.5H5a.75.75 0 01.75.75v1.315a.5.5 0 00.5.485h1.5a.5.5 0 00.5-.485V12.75A.75.75 0 019 12h1.5a.5.5 0 00.5-.5V9.806a.5.5 0 00-.158-.399l-.49-.245a2.25 2.25 0 01-1.342-2.052V5h-1.5z"

              </a>
            </li>
          </ul>
        </nav>

        <div class="border-t p-4">
          <a
            href="#settings"
            class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.835 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.835 2.942-.734 2.106-2.106a1.533 1.533 0 01-.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.835-1.372-.734-2.942-2.106-2.106A1.532 1.532 0 0111.49 3.17zM10 13a3 3 0 100-6 3 3 0 000 6z"
                clip-rule="evenodd"
              />
            </svg>
            <span class="ml-3 font-medium">Settings</span>
          </a>
        </div>
      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>

          <div x-data="headerController" class="hidden sm:block">
            <label for="activeChild" class="sr-only">Select Child</label>
            <select
              id="activeChild"
              x-model="selectedChildId"
              @change="updateGlobalChild(selectedChildId)"
              class="block w-48 rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
            >
              <option value="1">Viewing: Emily</option>
              <option value="2">Viewing: Michael</option>
            </select>
          </div>

          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
                <span
                  class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"
                ></span>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <div class="p-4 border-b">
                  <h3 class="font-semibold text-gray-800">Notifications</h3>
                </div>
                <div class="divide-y max-h-80 overflow-y-auto">
                  <a href="#" class="flex p-4 hover:bg-gray-50">
                    <div class="flex-shrink-0 mr-3">
                      <div
                        class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            d="M2 4a2 2 0 012-2h12a2 2 0 012 2v1H2V4zM2 7v1h16V7H2zm0 3v1h16v-1H2zm0 3v1h16v-1H2zm0 3v1a2 2 0 002 2h12a2 2 0 002-2v-1H2z"
                          />
                        </svg>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-800">Fee Payment Due</p>
                      <p class="text-xs text-gray-500">2 days ago</p>
                    </div>
                  </a>
                  <a href="#" class="flex p-4 hover:bg-gray-50">
                    <div class="flex-shrink-0 mr-3">
                      <div
                        class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M18 5v8a2 2 0 01-2 2h-5l-5 4v-4H4a2 2 0 01-2-2V5a2 2 0 012-2h12a2 2 0 012 2zM7 8H5v2h2V8zm2 0h2v2H9V8zm6 0h-2v2h2V8z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </div>
                    </div>
                    <div>
                      <p class="text-sm text-gray-800">
                        Message from Mr. David
                      </p>
                      <p class="text-xs text-gray-500">1 day ago</p>
                    </div>
                  </a>
                </div>
              </div>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Sarah Johnson</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                    clip-rule="evenodd"
                  />
                </svg>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="announcementsPage"
          @child-changed.window="changeChild($event.detail)"
        >
          <div class="max-w-4xl mx-auto">
            <div
              class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4"
            >
              <div>
                <h1 class="text-2xl font-semibold text-gray-900">
                  Announcements
                </h1>
                <p
                  class="text-sm text-gray-500 mt-1"
                  x-text="`News for ${currentChild.name} and School Wide`"
                ></p>
              </div>

              <div
                class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto"
              >
                <div class="relative w-full sm:w-64">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <svg
                      class="w-5 h-5 text-gray-400"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 20 20"
                      fill="currentColor"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                        clip-rule="evenodd"
                      />
                    </svg>
                  </div>
                  <input
                    type="search"
                    x-model="search"
                    placeholder="Search news..."
                    class="block w-full rounded-md border-gray-300 shadow-sm pl-10 focus:border-primary focus:ring-primary sm:text-sm"
                  />
                </div>
                <select
                  x-model="filterType"
                  class="w-full sm:w-auto rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                >
                  <option value="all">All News</option>
                  <option value="unread">Unread</option>
                </select>
              </div>
            </div>

            <div class="space-y-4">
              <template x-for="item in filteredAnnouncements" :key="item.id">
                <div
                  class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-200"
                  :class="{'border-l-4 border-l-primary': !item.isRead}"
                >
                  <div
                    class="p-4 cursor-pointer"
                    @click="item.expanded = !item.expanded"
                  >
                    <div class="flex justify-between items-start">
                      <div class="flex-1 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                          <span
                            class="text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wide"
                            :class="{
                                                'bg-indigo-100 text-indigo-800': item.category === 'School News',
                                                'bg-green-100 text-green-800': item.category.includes('Class'),
                                                'bg-red-100 text-red-800': item.category === 'Urgent',
                                                'bg-yellow-100 text-yellow-800': item.category === 'Event'
                                            }"
                            x-text="item.category"
                          >
                          </span>
                          <span
                            class="text-xs text-gray-500"
                            x-text="item.date"
                          ></span>
                          <span
                            x-show="!item.isRead"
                            class="h-2 w-2 bg-red-500 rounded-full"
                          ></span>
                        </div>
                        <h3
                          class="text-lg font-semibold text-gray-900 leading-tight"
                          x-text="item.title"
                        ></h3>
                        <p
                          class="text-sm text-gray-600 mt-1 line-clamp-2"
                          x-show="!item.expanded"
                          x-text="item.content"
                        ></p>
                      </div>
                      <button
                        class="text-gray-400 hover:text-gray-600 transition-transform duration-200"
                        :class="{'rotate-180': item.expanded}"
                      >
                        <svg
                          class="w-5 h-5"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </button>
                    </div>
                  </div>

                  <div
                    x-show="item.expanded"
                    x-cloak
                    x-transition
                    class="px-4 pb-4"
                  >
                    <hr class="my-2 border-gray-100" />
                    <p
                      class="text-sm text-gray-700 whitespace-pre-line mb-4"
                      x-text="item.content"
                    ></p>
                    <div class="flex items-center justify-between">
                      <p
                        class="text-xs text-gray-500"
                        x-text="`Posted by: ${item.author}`"
                      ></p>
                      <button
                        @click.stop="markAsRead(item.id)"
                        x-show="!item.isRead"
                        class="text-sm font-medium text-primary hover:text-primary-hover flex items-center"
                      >
                        <svg
                          class="w-4 h-4 mr-1"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        Mark as Read
                      </button>
                      <span
                        x-show="item.isRead"
                        class="text-xs font-medium text-gray-400 flex items-center"
                      >
                        <svg
                          class="w-4 h-4 mr-1"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        Read
                      </span>
                    </div>
                  </div>
                </div>
              </template>

              <div
                x-show="filteredAnnouncements.length === 0"
                class="text-center py-12 bg-white rounded-lg border border-dashed border-gray-300"
              >
                <svg
                  class="mx-auto h-12 w-12 text-gray-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"
                  />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">
                  No announcements found
                </h3>
                <p class="mt-1 text-sm text-gray-500">
                  Try adjusting your search or filters.
                </p>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // Header Controller to dispatch events when child changes (Global)
      function headerController() {
        return {
          selectedChildId: "1",
          updateGlobalChild(id) {
            window.dispatchEvent(
              new CustomEvent("child-changed", { detail: id })
            );
          },
        };
      }

      function announcementsPage() {
        return {
          activeChildId: "1",
          filterType: "all",
          search: "",

          // Master list of announcements
          // Categories: 'School News', 'Event', 'Urgent', 'Class 10A', 'Class 8B'
          allAnnouncements: [
            {
              id: 1,
              title: "School Closed for Winter Break",
              date: "Dec 18, 2023",
              author: "Principal Skinner",
              category: "School News",
              content:
                "The school will be closed for Winter Break starting from Dec 20th to Jan 5th. We wish all families a happy holiday season!",
              isRead: false,
              expanded: false,
            },
            {
              id: 2,
              title: "Parent-Teacher Conference",
              date: "Dec 10, 2023",
              author: "Admin Office",
              category: "Event",
              content:
                "Parent-Teacher conferences are scheduled for next Friday. Please book your slot via the dashboard.",
              isRead: true,
              expanded: false,
            },
            {
              id: 3,
              title: "Urgent: Snow Day Warning",
              date: "Dec 05, 2023",
              author: "Safety Officer",
              category: "Urgent",
              content:
                "Due to heavy snowfall predictions, school might be closed tomorrow. Please check your email at 6 AM for confirmation.",
              isRead: false,
              expanded: false,
            },
            {
              id: 4,
              title: "Math 10A: Calculus Exam Rescheduled",
              date: "Dec 12, 2023",
              author: "Mr. David",
              category: "Class 10A",
              content:
                "The Calculus exam originally scheduled for Monday has been moved to Wednesday due to the assembly.",
              isRead: false,
              expanded: false,
            },
            {
              id: 5,
              title: "Science Fair: Grade 8",
              date: "Nov 28, 2023",
              author: "Mr. Clarke",
              category: "Class 8B",
              content:
                "Reminder to all Grade 8 parents: Science Fair project proposals are due next week.",
              isRead: true,
              expanded: false,
            },
          ],

          // Child mapping for filtering logic
          childProfiles: {
            1: { name: "Emily", classCategory: "Class 10A" },
            2: { name: "Michael", classCategory: "Class 8B" },
          },

          get currentChild() {
            return this.childProfiles[this.activeChildId];
          },

          // Logic to switch context
          changeChild(id) {
            this.activeChildId = id;
          },

          markAsRead(id) {
            const item = this.allAnnouncements.find((a) => a.id === id);
            if (item) item.isRead = true;
          },

          get filteredAnnouncements() {
            const childClass = this.currentChild.classCategory;

            return this.allAnnouncements.filter((item) => {
              // 1. Context Filter: Show if it's School/Urgent/Event OR matches specific child's class
              const isRelevant =
                ["School News", "Event", "Urgent"].includes(item.category) ||
                item.category === childClass;
              if (!isRelevant) return false;

              // 2. Search Filter
              const matchesSearch =
                item.title.toLowerCase().includes(this.search.toLowerCase()) ||
                item.content.toLowerCase().includes(this.search.toLowerCase());
              if (!matchesSearch) return false;

              // 3. Type Filter (Unread vs All)
              if (this.filterType === "unread" && item.isRead) return false;

              return true;
            });
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("headerController", headerController);
        Alpine.data("announcementsPage", announcementsPage);
      });
    </script>
  </body>
</html>
