<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Gradebook</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <style>
      /* Simple scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <div
      x-data="{ sidebarOpen: window.innerWidth > 1024, profileOpen: false, notificationOpen: false }"
      class="flex h-screen bg-gray-100"
    >
      <div
        x-show="sidebarOpen"
        @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/50 z-30 lg:hidden"
        x-cloak
      ></div>

      <aside
        class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col bg-white border-r transition-transform duration-300 transform"
        :class="{ '-translate-x-full': !sidebarOpen, 'translate-x-0': sidebarOpen }"
      >
        <div class="h-24 flex items-center justify-center border-b">
          <div class="flex flex-col items-center text-center p-4">
            <img
              class="h-14 w-14 rounded-full"
              src="https://placehold.co/100x100/FEF3C7/9A3412?text=SJ"
              alt="Sarah Johnson"
            />
            <h3 class="text-sm font-semibold text-gray-800 mt-2">
              Sarah Johnson
            </h3>
            <span class="text-xs text-gray-500">Parent ID: PAR45678</span>
          </div>
        </div>

        <nav class="flex-1 overflow-y-auto">
          <ul class="py-4">
            <li class="px-4">
              <a
                href="parent_dashboard.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V17a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
                  />
                </svg>
                <span class="ml-3 font-medium">Dashboard</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="my_children.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"
                  />
                </svg>
                <span class="ml-3 font-medium">My Children</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_gradebook.html"
                class="flex items-center px-4 py-3 bg-primary text-white rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.004-.002l.004-.002l.003-.001l.002-.001l.002-.001L10.394 3.2l.002.001l.002.001l.003.001l.004.002l.004.002a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"
                  />
                  <path
                    d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"
                  />
                  <path
                    d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
                  />
                </svg>
                <span class="ml-3 font-medium">Gradebook</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_upcoming_work.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                  <path
                    fill-rule="evenodd"
                    d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                    clip-rule="evenodd"
                  />
                </svg>
                <span class="ml-3 font-medium">Upcoming Work</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_announcements.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10 3.5A1.5 1.5 0 0111.5 5v1.615a.75.75 0 00.416.678l.49.245a1.5 1.5 0 01.894 1.368V10.5A1.5 1.5 0 0113 12h-1.5a.75.75 0 00-.75.75v1.315a1.5 1.5 0 01-1.5 1.435h-1.5A1.5 1.5 0 016 14.065V12.75A.75.75 0 005.25 12H3.75a1.5 1.5 0 01-1.5-1.5V9.406a1.5 1.5 0 01.894-1.368l.49-.245A.75.75 0 004 7.115V5A1.5 1.5 0 015.5 3.5h3A1.5 1.5 0 0110 3.5zM8.5 5V3.5h-3A.5.5 0 005 4v3.115a2.25 2.25 0 01-1.342 2.052l-.49.245A.5.5 0 003 9.806V10.5a.5.5 0 00.5.5H5a.75.75 0 01.75.75v1.315a.5.5 0 00.5.485h1.5a.5.5 0 00.5-.485V12.75A.75.75 0 019 12h1.5a.5.5 0 00.5-.5V9.806a.5.5 0 00-.158-.399l-.49-.245a2.25 2.25 0 01-1.342-2.052V5h-1.5z"
                  />
                </svg>
                <span class="ml-3 font-medium">Announcements</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
        x-data="parentGradebook"
        x-init="init()"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>

          <div>
            <label for="activeChild" class="sr-only">Select Child</label>
            <select
              id="activeChild"
              x-model="activeChildId"
              @change="updateChildData()"
              class="block w-full sm:w-64 rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
            >
              <template x-for="child in children" :key="child.id">
                <option
                  :value="child.id"
                  x-text="`Viewing: ${child.name}`"
                ></option>
              </template>
            </select>
          </div>

          <div class="flex items-center space-x-4"></div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
        >
          <div class="max-w-7xl mx-auto">
            <div class="mb-6">
              <h1 class="text-2xl font-semibold text-gray-900">Gradebook</h1>
              <p
                class="text-sm text-gray-600"
                x-text="`Showing grades for ${activeChildData.name}`"
              ></p>
            </div>

            <div class="mb-6">
              <div class="bg-white p-6 rounded-lg shadow-sm inline-block">
                <span class="text-sm text-gray-500">Overall GPA</span>
                <p
                  class="text-3xl font-bold text-gray-900"
                  x-text="activeChildData.overallGrade"
                ></p>
              </div>
            </div>

            <div class="space-y-4">
              <h2 class="text-lg font-semibold text-gray-900">By Subject</h2>

              <div
                class="hidden sm:grid grid-cols-4 gap-4 px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
              >
                <span>Subject</span>
                <span>Teacher</span>
                <span>Subject Grade</span>
                <span class="sr-only">Actions</span>
              </div>

              <template
                x-for="subject in activeChildData.subjects"
                :key="subject.name"
              >
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                  <div
                    class="grid grid-cols-2 sm:grid-cols-4 gap-4 items-center p-4"
                  >
                    <div
                      class="sm:hidden text-xs font-medium text-gray-500 uppercase"
                    >
                      Subject
                    </div>
                    <div
                      class="sm:hidden text-xs font-medium text-gray-500 uppercase"
                    >
                      Teacher
                    </div>

                    <p
                      class="text-sm font-semibold text-gray-900"
                      x-text="subject.name"
                    ></p>
                    <p
                      class="text-sm text-gray-600"
                      x-text="subject.teacher"
                    ></p>

                    <div
                      class="sm:hidden text-xs font-medium text-gray-500 uppercase"
                    >
                      Subject Grade
                    </div>
                    <p
                      class="text-lg font-bold text-primary"
                      x-text="subject.grade"
                    ></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <div
            x-show="showDetailModal"
            @keydown.escape.window="showDetailModal = false"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
            x-cloak
          >
            <div
              x-show="showDetailModal"
              @click.away="showDetailModal = false"
              x-transition
              class="bg-white rounded-lg shadow-xl w-full max-w-2xl"
            >
              <div class="flex items-center justify-between p-4 border-b">
                <div>
                  <h3
                    class="text-lg font-semibold text-gray-900"
                    x-text="currentSubject.name"
                  ></h3>
                  <p
                    class="text-sm text-gray-500"
                    x-text="`Teacher: ${currentSubject.teacher}`"
                  ></p>
                </div>
                <button
                  @click="showDetailModal = false"
                  type="button"
                  class="text-gray-400 hover:text-gray-600"
                >
                  <svg
                    class="w-6 h-6"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"
                    />
                  </svg>
                </button>
              </div>

              <div class="p-6 max-h-[60vh] overflow-y-auto">
                <div class="space-y-4">
                  <template
                    x-for="category in currentSubject.categories"
                    :key="category.name"
                  >
                    <div>
                      <h4
                        class="text-sm font-semibold text-gray-800 mb-2"
                        x-text="category.name"
                      ></h4>
                      <ul class="divide-y divide-gray-200 border rounded-md">
                        <template
                          x-for="item in category.items"
                          :key="item.title"
                        >
                          <li class="flex justify-between items-center p-3">
                            <span
                              class="text-sm text-gray-700"
                              x-text="item.title"
                            ></span>
                            <span
                              class="text-sm font-bold text-gray-900"
                              x-text="item.grade"
                            ></span>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                </div>
              </div>

              <div
                class="flex justify-end items-center p-4 bg-gray-50 border-t"
              >
                <button
                  @click="showDetailModal = false"
                  type="button"
                  class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                >
                  Close
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      function parentGradebook() {
        return {
          children: [
            { id: "1", name: "Emily Johnson (Grade 10)" },
            { id: "2", name: "Michael Johnson (Grade 8)" },
          ],
          activeChildId: "1",
          activeChildData: { name: "", overallGrade: "", subjects: [] }, // Default empty structure
          showDetailModal: false,
          currentSubject: { name: "", teacher: "", categories: [] }, // For the modal

          // Mock database of all children's data
          // CHANGED: Updated grades to reflect a GPA system
          allChildData: {
            1: {
              name: "Emily Johnson",
              overallGrade: "A- (3.8 GPA)",
              subjects: [
                {
                  name: "Mathematics",
                  teacher: "Mr. David",
                  grade: "A- (3.7 GPA)",
                  categories: [
                    {
                      name: "Exams",
                      items: [
                        { title: "Part - 1", grade: "92/100" },
                        { title: "Part - 2", grade: "88/100" },
                      ],
                    },
                  ],
                },
                {
                  name: "Physics",
                  teacher: "Ms. Frizzle",
                  grade: "B+ (3.3 GPA)",
                  categories: [
                    {
                      name: "Labs",
                      items: [{ title: "Optics Lab Report", grade: "88/100" }],
                    },
                  ],
                },
                {
                  name: "World History",
                  teacher: "Mr. Gable",
                  grade: "A (4.0 GPA)",
                  categories: [
                    {
                      name: "Essays",
                      items: [{ title: "Renaissance Essay", grade: "95/100" }],
                    },
                  ],
                },
              ],
            },
            2: {
              name: "Michael Johnson",
              overallGrade: "B (3.0 GPA)",
              subjects: [
                {
                  name: "English",
                  teacher: "Ms. Honey",
                  grade: "B- (2.7 GPA)",
                  categories: [
                    {
                      name: "Essays",
                      items: [{ title: "Book Report", grade: "80/100" }],
                    },
                    {
                      name: "Quizzes",
                      items: [{ title: "Vocabulary Quiz 1", grade: "84/100" }],
                    },
                  ],
                },
                {
                  name: "Science",
                  teacher: "Mr. Clarke",
                  grade: "B+ (3.3 GPA)",
                  categories: [
                    {
                      name: "Projects",
                      items: [{ title: "Cell Diorama", grade: "88/100" }],
                    },
                  ],
                },
              ],
            },
          },

          init() {
            // Check for a child ID in the URL on page load
            const urlParams = new URLSearchParams(window.location.search);
            const childId = urlParams.get("id");
            if (childId && this.allChildData[childId]) {
              this.activeChildId = childId;
            }

            this.activeChildData = this.allChildData[this.activeChildId];
          },

          updateChildData() {
            this.activeChildData = this.allChildData[this.activeChildId];
          },

          openDetailModal(subject) {
            this.currentSubject = subject;
            this.showDetailModal = true;
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("parentGradebook", parentGradebook);
      });
    </script>
  </body>
</html>
