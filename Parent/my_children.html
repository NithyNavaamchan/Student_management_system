<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Children</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              primary: {
                DEFAULT: "#4F46E5", // Indigo-600
                hover: "#4338CA", // Indigo-700
              },
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>

    <style>
      /* Simple scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <div
      x-data="{ sidebarOpen: window.innerWidth > 1024, profileOpen: false, notificationOpen: false }"
      class="flex h-screen bg-gray-100"
    >
      <div
        x-show="sidebarOpen"
        @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/50 z-30 lg:hidden"
        x-cloak
      ></div>

      <aside
        class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col bg-white border-r transition-transform duration-300 transform"
        :class="{ '-translate-x-full': !sidebarOpen, 'translate-x-0': sidebarOpen }"
      >
        <div class="h-24 flex items-center justify-center border-b">
          <div class="flex flex-col items-center text-center p-4">
            <img
              class="h-14 w-14 rounded-full"
              src="https://placehold.co/100x100/FEF3C7/9A3412?text=SJ"
              alt="Sarah Johnson"
            />
            <h3 class="text-sm font-semibold text-gray-800 mt-2">
              Sarah Johnson
            </h3>
            <span class="text-xs text-gray-500">Parent ID: PAR45678</span>
          </div>
        </div>

        <nav class="flex-1 overflow-y-auto">
          <ul class="py-4">
            <li class="px-4">
              <a
                href="parent_dashboard.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V17a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
                  />
                </svg>
                <span class="ml-3 font-medium">Dashboard</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="my_children.html"
                class="flex items-center px-4 py-3 bg-primary text-white rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"
                  />
                </svg>
                <span class="ml-3 font-medium">My Children</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_gradebook.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.004-.002l.004-.002l.003-.001l.002-.001l.002-.001L10.394 3.2l.002.001l.002.001l.003.001l.004.002l.004.002a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"

                    d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"

                  />
                </svg>
                <span class="ml-3 font-medium">Gradebook</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_upcoming_work.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                  <path
                    fill-rule="evenodd"
                    d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h.01a1 1 0 100-2H10zm3 0a1 1 0 000 2h.01a1 1 0 100-2H13z"
                    clip-rule="evenodd"
                  />
                </svg>
                <span class="ml-3 font-medium">Upcoming Work</span>
              </a>
            </li>
            <li class="px-4 mt-2">
              <a
                href="parent_announcements.html"
                class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg"
              >
                <svg
                  class="w-5 h-5"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10 3.5A1.5 1.5 0 0111.5 5v1.615a.75.75 0 00.416.678l.49.245a1.5 1.5 0 01.894 1.368V10.5A1.5 1.5 0 0113 12h-1.5a.75.75 0 00-.75.75v1.315a1.5 1.5 0 01-1.5 1.435h-1.5A1.5 1.5 0 016 14.065V12.75A.75.75 0 005.25 12H3.75a1.5 1.5 0 01-1.5-1.5V9.406a1.5 1.5 0 01.894-1.368l.49-.245A.75.75 0 004 7.115V5A1.5 1.5 0 015.5 3.5h3A1.5 1.5 0 0110 3.5zM8.5 5V3.5h-3A.5.5 0 005 4v3.115a2.25 2.25 0 01-1.342 2.052l-.49.245A.5.5 0 003 9.806V10.5a.5.5 0 00.5.5H5a.75.75 0 01.75.75v1.315a.5.5 0 00.5.485h1.5a.5.5 0 00.5-.485V12.75A.75.75 0 019 12h1.5a.5.5 0 00.5-.5V9.806a.5.5 0 00-.158-.399l-.49-.245a2.25 2.25 0 01-1.342-2.052V5h-1.5z"
                  />
                </svg>
                <span class="ml-3 font-medium">Announcements</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
      >
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>

          <div class="hidden md:flex items-center">
            <svg
              class="w-6 h-6 text-primary"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V17a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
              />
            </svg>
            <h2 class="ml-2 text-lg font-semibold text-gray-800">
              Parent Portal
            </h2>
          </div>

          <div class="flex items-center space-x-4">
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; profileOpen = false"
                class="text-gray-600 hover:text-gray-800 relative"
              >
                <svg
                  class="w-6 h-6"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.017 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                  />
                </svg>
                <span
                  class="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"
                ></span>
              </button>
            </div>
            <div class="relative" x-data="{ open: false }">
              <button
                @click="open = !open; notificationOpen = false"
                class="flex items-center space-x-2"
              >
                <span class="text-sm font-medium text-gray-800 hidden sm:block"
                  >Sarah Johnson</span
                >
                <svg
                  class="w-4 h-4 text-gray-500"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    fill-rule="evenodd"
                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                    clip-rule="evenodd"
                  />
                </svg>
              </button>
              <div
                x-show="open"
                @click.away="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl overflow-hidden z-10"
              >
                <a
                  href="#logout"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                  >Logout</a
                >
              </div>
            </div>
          </div>
        </header>

        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
          x-data="myChildrenPage"
          x-init="init()"
        >
          <div class="max-w-7xl mx-auto">
            <div
              class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4"
            >
              <h1 class="text-2xl font-semibold text-gray-900">My Children</h1>
              <button
                @click="showAddChildModal = true"
                type="button"
                class="w-full sm:w-auto justify-center flex items-center px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
              >
                <svg
                  class="w-5 h-5 mr-2"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 20 20"
                  fill="currentColor"
                >
                  <path
                    d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"
                  />
                </svg>
                Add Another Child
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              <template x-for="child in children" :key="child.id">
                <div
                  class="bg-white rounded-lg shadow-sm flex flex-col overflow-hidden"
                >
                  <div class="p-5 flex items-center space-x-4">
                    <img
                      class="h-16 w-16 rounded-full"
                      :src="child.photoUrl"
                      :alt="child.name"
                    />
                    <div>
                      <h2
                        class="text-lg font-bold text-gray-900"
                        x-text="child.name"
                      ></h2>
                      <p class="text-sm text-gray-600" x-text="child.grade"></p>
                    </div>
                  </div>

                  <div
                    class="grid grid-cols-3 gap-px bg-gray-50 border-t border-b border-gray-200"
                  >
                    <div class="p-4 text-center">
                      <p class="text-xs font-medium text-gray-500 uppercase">
                        Today's Status
                      </p>
                      <span
                        class="text-sm font-bold"
                        :class="{
                            'text-green-600': child.todayStatus === 'Present',
                            'text-red-600': child.todayStatus === 'Absent',
                            'text-yellow-600': child.todayStatus === 'Late'
                        }"
                        x-text="child.todayStatus"
                      ></span>
                    </div>
                    <div class="p-4 text-center">
                      <p class="text-xs font-medium text-gray-500 uppercase">
                        Overall Grade
                      </p>
                      <span
                        class="text-sm font-bold text-gray-900"
                        x-text="child.overallGrade"
                      ></span>
                    </div>
                    <div class="p-4 text-center">
                      <p class="text-xs font-medium text-gray-500 uppercase">
                        Pending Work
                      </p>
                      <span
                        class="text-sm font-bold text-gray-900"
                        x-text="child.pendingAssignments"
                      ></span>
                    </div>
                  </div>

                  <div class="p-4 space-y-2">
                    <a
                      :href="`parent_dashboard.html?id=${child.id}`"
                      class="w-full flex justify-center items-center px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                    >
                      View Dashboard
                    </a>
                    <div class="flex space-x-2">
                      <a
                        :href="`parent_gradebook.html?id=${child.id}`"
                        class="w-full flex justify-center items-center px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 rounded-lg shadow-sm hover:bg-gray-50"
                      >
                        Gradebook
                      </a>
                      <a
                        :href="`parent_attendance.html?id=${child.id}`"
                        class="w-full flex justify-center items-center px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 rounded-lg shadow-sm hover:bg-gray-50"
                      >
                        Attendance
                      </a>
                    </div>
                    <button
                      @click="openNotificationModal(child)"
                      type="button"
                      class="w-full flex justify-center items-center px-4 py-2 text-sm font-medium text-gray-600 hover:text-primary hover:bg-indigo-50 rounded-lg"
                    >
                      Manage Notifications
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <div
            x-show="showAddChildModal"
            @keydown.escape.window="showAddChildModal = false"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
            x-cloak
          >
            <form
              @submit.prevent="addChild"
              x-show="showAddChildModal"
              @click.away="showAddChildModal = false"
              x-transition
              class="bg-white rounded-lg shadow-xl w-full max-w-lg"
            >
              <div class="flex items-center justify-between p-4 border-b">
                <h3 class="text-lg font-semibold text-gray-900">
                  Add Another Child
                </h3>
                <button
                  @click="showAddChildModal = false"
                  type="button"
                  class="text-gray-400 hover:text-gray-600"
                >
                  <svg
                    class="w-6 h-6"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"
                    />
                  </svg>
                </button>
              </div>
              <div class="p-6 space-y-4">
                <div>
                  <label
                    for="studentId"
                    class="block text-sm font-medium text-gray-700"
                    >Student ID</label
                  >
                  <input
                    type="text"
                    x-model="newChild.id"
                    id="studentId"
                    class="mt-1 block w-full rounded-md border-gray-300"
                    required
                  />
                </div>
                <div>
                  <label
                    for="studentDob"
                    class="block text-sm font-medium text-gray-700"
                    >Student Date of Birth</label
                  >
                  <input
                    type="date"
                    x-model="newChild.dob"
                    id="studentDob"
                    class="mt-1 block w-full rounded-md border-gray-300"
                    required
                  />
                </div>
              </div>
              <div
                class="flex justify-end items-center p-4 bg-gray-50 border-t"
              >
                <button
                  @click="showAddChildModal = false"
                  type="button"
                  class="px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 rounded-lg shadow-sm hover:bg-gray-50"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  class="ml-3 px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                >
                  Add Child
                </button>
              </div>
            </form>
          </div>
          <div
            x-show="showNotificationModal"
            @keydown.escape.window="showNotificationModal = false"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
            x-cloak
          >
            <form
              @submit.prevent="saveNotifications"
              x-show="showNotificationModal"
              @click.away="showNotificationModal = false"
              x-transition
              class="bg-white rounded-lg shadow-xl w-full max-w-lg"
            >
              <div class="flex items-center justify-between p-4 border-b">
                <h3 class="text-lg font-semibold text-gray-900">
                  Notifications for <span x-text="currentChild.name"></span>
                </h3>
                <button
                  @click="showNotificationModal = false"
                  type="button"
                  class="text-gray-400 hover:text-gray-600"
                >
                  <svg
                    class="w-6 h-6"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"
                    />
                  </svg>
                </button>
              </div>
              <div class="p-6 space-y-4">
                <fieldset class="space-y-3">
                  <legend class="text-sm font-medium text-gray-900">
                    Email Me When...
                  </legend>
                  <div class="relative flex items-start">
                    <div class="flex h-6 items-center">
                      <input
                        id="notif-absent"
                        type="checkbox"
                        x-model="currentChild.notifications.onAbsent"
                        class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary"
                      />
                    </div>
                    <div class="ml-3 text-sm leading-6">
                      <label
                        for="notif-absent"
                        class="font-medium text-gray-700"
                        >My child is marked ABENT</label
                      >
                    </div>
                  </div>
                  <div class="relative flex items-start">
                    <div class="flex h-6 items-center">
                      <input
                        id="notif-late"
                        type="checkbox"
                        x-model="currentChild.notifications.onLate"
                        class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary"
                      />
                    </div>
                    <div class="ml-3 text-sm leading-6">
                      <label for="notif-late" class="font-medium text-gray-700"
                        >My child is marked LATE</label
                      >
                    </div>
                  </div>
                  <div class="relative flex items-start">
                    <div class="flex h-6 items-center">
                      <input
                        id="notif-grade"
                        type="checkbox"
                        x-model="currentChild.notifications.onGrade"
                        class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary"
                      />
                    </div>
                    <div class="ml-3 text-sm leading-6">
                      <label for="notif-grade" class="font-medium text-gray-700"
                        >A new grade is posted</label
                      >
                    </div>
                  </div>
                  <div class="relative flex items-start">
                    <div class="flex h-6 items-center">
                      <input
                        id="notif-announcement"
                        type="checkbox"
                        x-model="currentChild.notifications.onAnnouncement"
                        class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary"
                      />
                    </div>
                    <div class="ml-3 text-sm leading-6">
                      <label
                        for="notif-announcement"
                        class="font-medium text-gray-700"
                        >A new school announcement is posted</label
                      >
                    </div>
                  </div>
                </fieldset>
              </div>
              <div
                class="flex justify-end items-center p-4 bg-gray-50 border-t"
              >
                <button
                  @click="showNotificationModal = false"
                  type="button"
                  class="px-4 py-2 bg-white border border-gray-300 text-sm font-medium text-gray-700 rounded-lg shadow-sm hover:bg-gray-50"
                >
                  Cancel
                </button>
                <button
                  type="submit"
                  class="ml-3 px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg shadow-sm hover:bg-primary-hover"
                >
                  Save Settings
                </button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script>
      function myChildrenPage() {
        return {
          showAddChildModal: false,
          showNotificationModal: false,
          newChild: { id: "", dob: "" },
          currentChild: { id: null, name: "", notifications: {} },
          children: [],

          init() {
            // Load children data
            this.children = [
              {
                id: "1",
                name: "Emily Johnson",
                grade: "Grade 10",
                photoUrl: "https://placehold.co/100x100/E2E8F0/4A5568?text=EJ",
                todayStatus: "Present",
                overallGrade: "A-",
                pendingAssignments: 2,
                notifications: {
                  onAbsent: true,
                  onLate: true,
                  onGrade: true,
                  onAnnouncement: false,
                },
              },
              {
                id: "2",
                name: "Michael Johnson",
                grade: "Grade 8",
                photoUrl: "https://placehold.co/100x100/D1FAE5/065F46?text=MJ",
                todayStatus: "Late",
                overallGrade: "B",
                pendingAssignments: 4,
                notifications: {
                  onAbsent: true,
                  onLate: false,
                  onGrade: true,
                  onAnnouncement: true,
                },
              },
            ];
          },

          openNotificationModal(child) {
            // Use a copy so changes aren't live-updated on the card
            this.currentChild = JSON.parse(JSON.stringify(child));
            this.showNotificationModal = true;
          },

          saveNotifications() {
            // In a real app, send this to the server
            console.log(
              "Saving settings for",
              this.currentChild.id,
              this.currentChild.notifications
            );

            // Update the original array
            let index = this.children.findIndex(
              (c) => c.id === this.currentChild.id
            );
            if (index !== -1) {
              this.children[index].notifications =
                this.currentChild.notifications;
            }

            this.showNotificationModal = false;
            alert("Notification settings saved!");
          },

          addChild() {
            // In a real app, you'd send this to the server to verify and link
            alert(
              `Linking child with ID: ${this.newChild.id} and DOB: ${this.newChild.dob}`
            );
            this.newChild = { id: "", dob: "" };
            this.showAddChildModal = false;
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("myChildrenPage", myChildrenPage);
      });
    </script>
  </body>
</html>
