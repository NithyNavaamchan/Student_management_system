              Assignments
            </h1>

            <!-- Tab Navigation & Search -->
            <div
              class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4"
            >
              <!-- Tabs -->
              <div class="border-b border-gray-200 w-full sm:w-auto">
                <nav class="-mb-px flex flex-wrap space-x-6" aria-label="Tabs">
                  <button
                    @click="activeTab = 'all'"
                    :class="{ 'border-primary text-primary': activeTab === 'all', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'all' }"
                    class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                  >
                    All
                  </button>
                  <button
                    @click="activeTab = 'pending'"
                    :class="{ 'border-primary text-primary': activeTab === 'pending', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'pending' }"
                    class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                  >
                    Pending
                  </button>
                  <button
                    @click="activeTab = 'overdue'"
                    :class="{ 'border-primary text-primary': activeTab === 'overdue', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'overdue' }"
                    class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                  >
                    Overdue
                  </button>
                  <button
                    @click="activeTab = 'submitted'"
                    :class="{ 'border-primary text-primary': activeTab === 'submitted', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'submitted' }"
                    class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                  >
                    Submitted
                  </button>
                  <button
                    @click="activeTab = 'graded'"
                    :class="{ 'border-primary text-primary': activeTab === 'graded', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'graded' }"
                    class="whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm"
                  >
                    Graded
                  </button>
                </nav>
              </div>
              <!-- Search & Sort Controls -->
              <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">

                  <select
                    x-model="sortBy"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                  >
                    <option value="due_newest">Due Date (Newest)</option>
                    <option value="due_oldest">Due Date (Oldest)</option>
                    <option value="subject_az">Subject (A-Z)</option>
                  </select>
                </div>
                <!-- Search Bar -->
                <div class="relative w-full sm:w-64">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <svg
                      class="w-5 h-5 text-gray-400"

                        d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z"
                        clip-rule="evenodd"
                      />
                    </svg>
                  </div>
                  <input
                    type="search"
                    x-model="search"
                    placeholder="Search assignments..."
                    class="block w-full rounded-md border-gray-300 shadow-sm pl-10 focus:border-primary focus:ring-primary sm:text-sm"
                  />
                </div>
              </div>
            </div>

            <!-- Main Content Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              <!-- Loading Skeleton -->
              <template x-if="isLoading">
                <template x-for="i in 3" :key="i">
                  <div
                    class="bg-white rounded-lg shadow-sm flex flex-col overflow-hidden animate-pulse"
                  >
                    <div class="p-5 flex-grow">
                      <div class="flex justify-between items-start mb-3">
                        <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                        <div class="h-4 bg-gray-200 rounded-full w-16"></div>
                      </div>
                      <div class="h-6 bg-gray-200 rounded w-3/4 mb-2"></div>
                      <div class="h-4 bg-gray-200 rounded w-1/2 mb-1"></div>
                      <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                    </div>
                    <div class="border-t border-gray-200 px-5 py-3">
                      <div class="h-5 bg-gray-200 rounded w-1/2 mx-auto"></div>
                    </div>
                  </div>
                </template>
              </template>

              <!-- Error Message -->
              <template x-if="error">
                <div
                  class="md:col-span-2 lg:col-span-3 bg-red-50 border-l-4 border-red-400 p-4 rounded-md shadow-sm"
                >
                  <div class="flex">
                    <div class="flex-shrink-0">

                        class="h-5 w-5 text-red-400"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </div>
                    <div class="ml-3">
                      <h3 class="text-sm font-medium text-red-800">
                        Failed to load assignments
                      </h3>
                      <p class="mt-1 text-sm text-red-700" x-text="error"></p>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Assignments Grid -->
              <template x-if="!isLoading && !error">
                <template
                  x-for="assignment in filteredAssignments"
                  :key="assignment.id"
                >
                  <div
                    class="bg-white rounded-lg shadow-sm flex flex-col overflow-hidden transition-shadow duration-200 hover:shadow-md"
                  >
                    <div class="p-5 flex-grow">
                      <div class="flex justify-between items-start mb-3">
                        <span
                          class="text-sm font-semibold text-primary"
                          x-text="assignment.subject"
                        ></span>
                        <span
                          class="text-xs font-semibold px-2.5 py-0.5 rounded-full"
                          :class="{
                            'bg-yellow-100 text-yellow-800':
                              assignment.status === 'Pending',
                            'bg-red-100 text-red-800':
                              assignment.status === 'Overdue',
                            'bg-blue-100 text-blue-800':
                              assignment.status === 'Submitted',
                            'bg-green-100 text-green-800':
                              assignment.status === 'Graded',
                          }"
                          x-text="assignment.status"
                        ></span>
                      </div>
                      <h3
                        class="text-lg font-bold text-gray-900 mb-2 truncate"
                        x-text="assignment.title"
                      ></h3>
                      <div class="flex items-center text-sm text-gray-500 mb-1">
                        <svg
                          class="w-4 h-4 mr-1.5 text-gray-400"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        Due:
                        <span
                          class="font-medium text-gray-600 ml-1"
                          x-text="assignment.dueDate"
                        ></span>
                      </div>
                      <div class="flex items-center text-sm text-gray-500">
                        <svg
                          class="w-4 h-4 mr-1.5 text-gray-400"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M15.965 4.376a1.5 1.5 0 01.328 1.18l-1.63 7.697a1.5 1.5 0 01-1.472 1.247H6.81a1.5 1.5 0 01-1.473-1.247L3.707 5.556a1.5 1.5 0 01.328-1.18A1.5 1.5 0 015.5 4h9a1.5 1.5 0 011.465.376zm-3.118 7.124a.75.75 0 01-.75-.75V8a.75.75 0 011.5 0v2.75a.75.75 0 01-.75.75zm-3.25 0a.75.75 0 01-.75-.75V8a.75.75 0 011.5 0v2.75a.75.75 0 01-.75.75z"
                            clip-rule="evenodd"
                          />
                        </svg>
                        Points:
                        <span
                          class="font-medium text-gray-600 ml-1"
                          x-text="assignment.points"
                        ></span>
                        <template x-if="assignment.grade !== null">
                          <span
                            class="ml-1 font-bold text-green-600"
                            x-text="'('+assignment.grade+')'"
                          ></span>
                        </template>
                      </div>
                    </div>
                    <div class="border-t border-gray-200 px-5 py-3">
                      <a
                        :href="'student_assignment_detail.html?id=' + assignment.id"
                        class="text-sm font-medium text-primary hover:text-primary-hover w-full flex justify-center items-center"
                      >
                        <template
                          x-if="assignment.status === 'Pending' || assignment.status === 'Overdue'"
                          ><span>Submit Assignment</span></template
                        >
                        <template x-if="assignment.status === 'Submitted'"
                          ><span>View Submission</span></template
                        >
                        <template x-if="assignment.status === 'Graded'"
                          ><span>View Grade & Feedback</span></template
                        >
                        <svg
                          class="w-4 h-4 ml-1"
                          xmlns="http://www.w3.org/2000/svg"
                          viewBox="0 0 20 20"
                          fill="currentColor"
                        >
                          <path
                            fill-rule="evenodd"
                            d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
                            clip-rule="evenodd"
                          />
                        </svg>
                      </a>
                    </div>
                  </div>
                </template>
              </template>

              <!-- No results message -->
              <template
                x-if="!isLoading && !error && filteredAssignments.length === 0"
              >
                <div
                  class="md:col-span-2 lg:col-span-3 text-center text-gray-500 py-16"
                >
                  <svg
                    class="mx-auto h-12 w-12 text-gray-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"
                    />
                  </svg>
                  <h3 class="mt-2 text-sm font-semibold text-gray-900">
                    No assignments found
                  </h3>
                  <p class="mt-1 text-sm text-gray-500" x-show="search === ''">
                    There are no assignments matching the filter "<span
                      x-text="activeTab"
                      class="font-medium"
                    ></span
                    >".
                  </p>
                  <p class="mt-1 text-sm text-gray-500" x-show="search !== ''">
                    Your search for "<span
                      x-text="search"
                      class="font-medium"
                    ></span
                    >" returned no results.
                  </p>
                </div>
              </template>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- JavaScript Block -->
    <script>
      function assignmentsData() {
        return {
          activeTab: "all", // 'all', 'pending', 'overdue', 'submitted', 'graded'
          search: "",
          sortBy: "due_newest", // 'due_newest', 'due_oldest', 'subject_az'
          assignments: [],
          isLoading: true,
          error: null,

          // Mock data that will be "fetched"
          mockData: [
            {
              id: 1,
              subject: "Advanced Mathematics",
              title: "Calculus Problem Set 1",
              status: "Pending",
              dueDate: "2023-12-10",
              points: 100,
              grade: null,
            },
            {
              id: 2,
              subject: "Data Structures",
              title: "Binary Tree Implementation",
              status: "Pending",
              dueDate: "2023-12-12",
              points: 50,
              grade: null,
            },
            {
              id: 3,
              subject: "Physics II",
              title: "Lab Report: Optics",
              status: "Submitted",
              dueDate: "2023-12-05",
              points: 75,
              grade: null,
            },
            {
              id: 4,
              subject: "World History",
              title: "Renaissance Essay",
              status: "Graded",
              dueDate: "2023-12-01",
              points: 100,
              grade: 88,
            },
            {
              id: 5,
              subject: "Computer Science",
              title: "Algorithm Analysis Homework",
              status: "Pending",
              dueDate: "2023-12-14",
              points: 100,
              grade: null,
            },
            {
              id: 6,
              subject: "English Literature",
              title: "Shakespeare Sonnet Analysis",
              status: "Overdue",
              dueDate: "2023-12-01",
              points: 25,
              grade: null,
            },
            {
              id: 7,
              subject: "Physics II",
              title: "Wave Motion Problems",
              status: "Graded",
              dueDate: "2023-11-28",
              points: 50,
              grade: 45,
            },
          ],

          // Initialize the component by fetching data
          init() {
            this.fetchAssignments();
          },

          // Mock data fetching function
          fetchAssignments() {
            this.isLoading = true;
            this.error = null;

            // Simulate a network request
            setTimeout(() => {
              try {
                // To test the error state, uncomment the line below:
                // if (Math.random() > 0.5) throw new Error("Could not connect to the server. Please try again later.");

                // Format dates for display from the raw data
                this.assignments = this.mockData.map((assignment) => {
                  const date = new Date(assignment.dueDate + "T00:00:00"); // Ensure parsing as local date
                  return {
                    ...assignment,
                    dueDate: date.toLocaleDateString("en-US", {
                      month: "short",
                      day: "numeric",
                      year: "numeric",
                    }),
                    rawDueDate: date, // Keep raw date object for sorting
                  };
                });

                this.isLoading = false;
              } catch (e) {
                this.error =
                  e.message || "An unknown error occurred while fetching data.";
                this.isLoading = false;
              }
            }, 1200); // 1.2 second delay
          },

          get filteredAssignments() {
            let filtered = [...this.assignments]; // Work with a copy

            // Filter by Tab Status
            if (this.activeTab !== "all") {
              filtered = filtered.filter((assignment) => {
                if (this.activeTab === "pending")
                  return assignment.status === "Pending";
                if (this.activeTab === "overdue")
                  return assignment.status === "Overdue";
                if (this.activeTab === "submitted")
                  return assignment.status === "Submitted";
                if (this.activeTab === "graded")
                  return assignment.status === "Graded";
                return false; // Should not happen
              });
            }

            // Filter by Search Term
            if (this.search.trim() !== "") {
              const searchTerm = this.search.toLowerCase();
              filtered = filtered.filter(
                (assignment) =>
                  assignment.title.toLowerCase().includes(searchTerm) ||
                  assignment.subject.toLowerCase().includes(searchTerm)
              );
            }

            // Sort the filtered results
            if (this.sortBy === "due_newest") {
              filtered.sort((a, b) => b.rawDueDate - a.rawDueDate);
            } else if (this.sortBy === "due_oldest") {
              filtered.sort((a, b) => a.rawDueDate - b.rawDueDate);
            } else if (this.sortBy === "subject_az") {
              filtered.sort((a, b) => a.subject.localeCompare(b.subject));
            }

            return filtered;
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("assignmentsData", assignmentsData);
      });
    </script>
  </body>
</html>
