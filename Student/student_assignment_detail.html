        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],

      }
      [x-cloak] {
        display: none !important;
      }
    </style>

            <li class="px-4 mt-2">
              <a

        <!-- Sidebar Footer -->
        <div class="border-t p-4">
          <span class="ml-3 font-medium">VTN</span>
        </div>
      </aside>

      <!-- Main content -->
      <div
        class="flex-1 flex flex-col overflow-hidden transition-all duration-300"
        :class="sidebarOpen ? 'lg:ml-64' : 'lg:ml-0'"
      >
        <!-- Top bar -->
        <header
          class="h-16 flex items-center justify-between bg-white border-b px-6"
        >
          <!-- ... (same as previous file's header) ... -->
          <!-- Sidebar Toggle -->
          <button
            @click="sidebarOpen = !sidebarOpen"
            class="text-gray-600 hover:text-gray-800"
          >
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
              />
            </svg>
          </button>
          <!-- Header Title (hidden on mobile) -->
          <div class="hidden md:flex items-center">
            <svg
              class="w-6 h-6 text-primary"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M10.394 2.08a1 1 0 00-1.79 0l-1.006.365a1 1 0 00-.5.867l.21 1.162a1 1 0 01-.44 1.06l-.75.603a1 1 0 00.11 1.74l1.07.19a1 1 0 01.82.78l.36 1.005a1 1 0 001.79 0l.36-1.005a1 1 0 01.82-.78l1.07-.19a1 1 0 00.11-1.74l-.75-.603a1 1 0 01-.44-1.06l.21-1.162a1 1 0 00-.5-.867l-1.006-.365zM9.61 3.23a1 1 0 00.78 0l.995.362a.01.01 0 01.005.008l-.209 1.157a.01.01 0 01-.004.01l.749.602a.01.01 0 01-.001.017l-1.07.19a.01.01 0 01-.008.008l-.36 1.004a.01.01 0 01-.018 0l-.36-1.004a.01.01 0 01-.008-.008l-1.07-.19a.01.01 0 01-.001-.017l.749-.602a.01.01 0 01-.004-.01l-.209-1.157a.01.01 0 01.005-.008l.995-.362z"
              />
              <path
                d="M11 6a1 1 0 10-2 0v3.013a1 1 0 00.5 1.789l.863.492a1 1 0 101-1.732L11 9.382V6z"
              />
              <path
                d="M4.17 10.342a7.5 7.5 0 1111.66 0 1 1 0 00.323 1.385l.007.005a1 1 0 001.385-.323A9.5 9.5 0 102.78 11.722a1 1 0 001.385.323l.007-.005a1 1 0 00.323-1.385z"
              />
            </svg>
            <h2 class="ml-2 text-lg font-semibold text-gray-800">
              Student Management System
            </h2>
          </div>
          <!-- Top bar right -->
          <div class="flex items-center space-x-4">
            <!-- (Same as previous file's notifications/profile) -->
          </div>
        </header>

        <!-- Main content area -->
        <main
          class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6"
        >
          <div class="max-w-7xl mx-auto" x-data="assignmentDetailData">
            <!-- Loading Skeleton -->
            <template x-if="isLoading">
              <div class="max-w-3xl mx-auto animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-1/4 mb-4"></div>
                <div class="h-8 sm:h-10 bg-gray-200 rounded w-3/4 mb-8"></div>
                <div class="lg:grid lg:grid-cols-3 lg:gap-8">
                  <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white rounded-lg shadow-sm p-6 space-y-4">
                      <div class="h-6 bg-gray-200 rounded w-1/3"></div>
                      <div class="h-4 bg-gray-200 rounded w-full"></div>
                      <div class="h-4 bg-gray-200 rounded w-full"></div>
                      <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                    </div>
                    <div class="bg-white rounded-lg shadow-sm p-6 space-y-4">
                      <div class="h-6 bg-gray-200 rounded w-1/3"></div>
                      <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                      <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                    </div>
                  </div>
                  <div class="lg:col-span-1 mt-6 lg:mt-0">
                    <div class="bg-white rounded-lg shadow-sm p-6 space-y-4">
                      <div class="h-6 bg-gray-200 rounded w-1/2"></div>
                      <div class="h-4 bg-gray-200 rounded w-full"></div>
                      <div class="h-4 bg-gray-200 rounded w-full"></div>
                      <div class="h-4 bg-gray-200 rounded w-full"></div>
                    </div>
                  </div>
                </div>
              </div>
            </template>

            <!-- Error Message -->
            <template x-if="error">
              <div class="max-w-3xl mx-auto">
                <a
                  href="student_assignments.html"
                  class="flex items-center text-sm font-medium text-gray-500 hover:text-gray-700 mb-4"
                >
                  <svg
                    class="w-5 h-5 mr-1"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
                      clip-rule="evenodd"
                    />
                  </svg>
                  Back to assignments
                </a>
                <div
                  class="bg-red-50 border-l-4 border-red-400 p-4 rounded-md shadow-sm"
                >
                  <div class="flex">
                    <div class="flex-shrink-0">
                      <svg
                        class="h-5 w-5 text-red-400"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 20 20"
                        fill="currentColor"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
                          clip-rule="evenodd"
                        />
                      </svg>
                    </div>
                    <div class="ml-3">
                      <h3 class="text-sm font-medium text-red-800">
                        Error loading assignment
                      </h3>
                      <p class="mt-1 text-sm text-red-700" x-text="error"></p>
                    </div>
                  </div>
                </div>
              </div>
            </template>

            <!-- Assignment Content -->
            <template x-if="!isLoading && !error && assignment">
              <div class_="max-w-7xl mx-auto">
                <!-- Page Header -->
                <div class="mb-6">
                  <a
                    href="student_assignments.html"
                    class="flex items-center text-sm font-medium text-gray-500 hover:text-gray-700 mb-2"
                  >
                    <svg
                      class="w-5 h-5 mr-1"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 20 20"
                      fill="currentColor"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
                        clip-rule="evenodd"
                      />
                    </svg>
                    Back to assignments
                  </a>
                  <!-- RESPONSIVE TITLE: smaller on mobile, larger on desktop -->
                  <h1
                    class="text-2xl sm:text-3xl font-bold text-gray-900"
                    x-text="assignment.title"
                  ></h1>
                </div>

                <!-- Main Grid -->
                <div class="lg:grid lg:grid-cols-3 lg:gap-8">
                  <!-- Left Column: Details & Submission -->
                  <div class="lg:col-span-2 space-y-6">
                    <!-- Instructions -->
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                      <div class="p-5 sm:p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">
                          Instructions
                        </h2>
                        <div
                          class="prose prose-sm max-w-none text-gray-600"
                          x-html="assignment.instructions"
                        ></div>
                      </div>
                    </div>

                    <!-- Attachments -->
                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                      <div class="p-5 sm:p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">
                          Attachments
                        </h2>
                        <ul class="space-y-3">
                          <template
                            x-for="file in assignment.attachments"
                            :key="file.name"
                          >
                            <li class="flex items-center">
                              <a
                                :href="file.url"
                                target="_blank"
                                class="flex items-center text-sm font-medium text-primary hover:text-primary-hover p-3 bg-gray-50 rounded-lg w-full"
                              >
                                <svg
                                  class="w-5 h-5 text-gray-400 mr-3"
                                  xmlns="http://www.w3.org/2000/svg"
                                  viewBox="0 0 20 20"
                                  fill="currentColor"
                                >
                                  <path
                                    fill-rule="evenodd"
                                    d="M15.621 4.379a3 3 0 00-4.242 0l-7 7a3 3 0 004.241 4.243l7-7a.75.75 0 011.06-1.06l-7 7a1.5 1.5 0 01-2.12-2.122l7-7a.75.75 0 00-1.06-1.06z"
                                    clip-rule="evenodd"
                                  />
                                </svg>
                                <span
                                  class="flex-1 truncate"
                                  x-text="file.name"
                                ></span>
                                <svg
                                  class="w-5 h-5 text-gray-500 ml-2"
                                  xmlns="http://www.w3.org/2000/svg"
                                  viewBox="0 0 20 20"
                                  fill="currentColor"
                                >
                                  <path
                                    fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-11.25a.75.75 0 00-1.5 0v4.59L7.3 9.7a.75.75 0 00-1.1 1.02l3.25 3.5a.75.75 0 001.1 0l3.25-3.5a.75.75 0 10-1.1-1.02l-1.95 2.1V6.75z"
                                    clip-rule="evenodd"
                                  />
                                </svg>
                              </a>
                            </li>
                          </template>
                        </ul>
                      </div>
                    </div>

                    <!-- Submission Box (Conditional) -->
                    <template
                      x-if="assignment.status === 'Pending' || assignment.status === 'Overdue'"
                    >
                      <div
                        class="bg-white rounded-lg shadow-sm overflow-hidden"
                      >
                        <div class="p-5 sm:p-6">
                          <h2 class="text-lg font-semibold text-gray-900 mb-4">
                            Submit Your Assignment
                          </h2>
                          <div class="space-y-4">
                            <!-- File Upload -->
                            <div>
                              <label
                                for="file-upload"
                                class="block text-sm font-medium text-gray-700"
                                >Upload Files</label
                              >
                              <div
                                @dragover.prevent
                                @dragleave.prevent
                                @drop.prevent="handleFileDrop($event)"
                                class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md"
                              >
                                <div class="space-y-1 text-center">
                                  <svg
                                    class="mx-auto h-12 w-12 text-gray-400"
                                    stroke="currentColor"
                                    fill="none"
                                    viewBox="0 0 48 48"
                                    aria-hidden="true"
                                  >
                                    <path
                                      d="M28 8H12a4 4 0 00-4 4v20m32-12v8a4 4 0 01-4 4H28m0-28v8a4 4 0 01-4 4H12m28 4l-4-4m0 0l-4 4m4-4v12"
                                      stroke-width="2"
                                      stroke-linecap="round"
                                      stroke-linejoin="round"
                                    />
                                  </svg>
                                  <!-- RESPONSIVE FILE UPLOAD TEXT: Stacks on mobile -->
                                  <div
                                    class="flex flex-col sm:flex-row sm:justify-center text-sm text-gray-600"
                                  >
                                    <label
                                      for="file-upload"
                                      class="relative cursor-pointer bg-white rounded-md font-medium text-primary hover:text-primary-hover focus-within:outline-none"
                                    >
                                      <span>Upload files</span>
                                      <input
                                        id="file-upload"
                                        name="file-upload"
                                        type="file"
                                        class="sr-only"
                                        multiple
                                        @change="handleFileInput($event)"
                                      />
                                    </label>
                                    <p class="sm:pl-1">or drag and drop</p>
                                  </div>
                                  <p class="text-xs text-gray-500">
                                    PNG, JPG, PDF up to 10MB
                                  </p>
                                </div>
                              </div>
                            </div>
                            <!-- File List -->
                            <template x-if="uploadedFiles.length > 0">
                              <ul class="space-y-2">
                                <template
                                  x-for="file in uploadedFiles"
                                  :key="file.name"
                                >
                                  <li
                                    class="flex items-center justify-between p-2 bg-gray-50 rounded-md"
                                  >
                                    <span
                                      class="text-sm font-medium text-gray-800 truncate"
                                      x-text="file.name"
                                    ></span>
                                    <button
                                      @click="removeFile(file.name)"
                                      class="text-gray-400 hover:text-red-500"
                                    >
                                      <svg
                                        class="w-4 h-4"
                                        fill="currentColor"
                                        viewBox="0 0 20 20"
                                      >
                                        <path
                                          fill-rule="evenodd"
                                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                          clip-rule="evenodd"
                                        />
                                      </svg>
                                    </button>
                                  </li>

                  <div class="lg:col-span-1 space-y-6 mt-6 lg:mt-0">

                    <div class="bg-white rounded-lg shadow-sm overflow-hidden">

                                class="text-xs font-semibold px-2.5 py-0.5 rounded-full"

                                  'bg-yellow-100 text-yellow-800':
                                    assignment.status === 'Pending',
                                  'bg-red-100 text-red-800':
                                    assignment.status === 'Overdue',
                                  'bg-blue-100 text-blue-800':

                          <template x-if="assignment.grade !== null">

                      </div>
                    </div>

                    <!-- Feedback Card (Conditional) -->
                    <template x-if="assignment.status === 'Graded'">
                      <div
                        class="bg-white rounded-lg shadow-sm overflow-hidden"
                      >
                        <div class="p-5 sm:p-6">
                          <h2 class="text-lg font-semibold text-gray-900 mb-4">
                            Grade & Feedback

                            <!-- RESPONSIVE GRADE: smaller on mobile, larger on desktop -->

                              class="text-3xl sm:text-4xl font-bold text-green-600"
                              x-text="assignment.grade"
                            ></span>
                            <span
                              class="text-lg text-gray-500"

                          <div

                </div>

    <!-- JavaScript Block -->
    <script>
      function assignmentDetailData() {
        return {
          assignment: null,
          isLoading: true,
          error: null,
          uploadedFiles: [],

          isSubmitting: false,

          // This mock data is copied from the list page to find the assignment

                {

              ],

            },
            {
              id: 2,
              subject: "Data Structures",
              title: "Binary Tree Implementation",
              status: "Pending",
              dueDate: "2023-12-12",
              points: 50,
              grade: null,
              instructions:
                "<p>Implement a binary search tree (BST) in a language of your choice. Your implementation should include insert, delete, and search methods.</p>",
              attachments: [{ name: "bst_requirements.txt", url: "#" }],
              feedback: null,
            },
            {
              id: 3,
              subject: "Physics II",
              title: "Lab Report: Optics",
              status: "Submitted",
              dueDate: "2023-12-05",
              points: 75,
              grade: null,
              instructions:
                "<p>Write a full lab report based on the optics experiment conducted in class. Include your hypothesis, methodology, results, and conclusion.</p>",
              attachments: [{ name: "lab_report_template.docx", url: "#" }],
              feedback: null,
            },
            {
              id: 4,
              subject: "World History",
              title: "Renaissance Essay",
              status: "Graded",
              dueDate: "2023-12-01",
              points: 100,
              grade: 88,
              instructions:
                "<p>Write a 1500-word essay on the impact of the printing press on the European Renaissance.</p>",
              attachments: [{ name: "essay_rubric.pdf", url: "#" }],
              feedback:
                "<p><strong>Great work, Emily!</strong></p><p>Your analysis of the printing press's role was thorough. You provided strong examples. Your argument could have been strengthened by discussing the counter-arguments or limitations of its impact more explicitly.</p><p>See minor grammar notes in the attached document.</p>",
            },
            {
              id: 5,
              subject: "Computer Science",
              title: "Algorithm Analysis Homework",
              status: "Pending",
              dueDate: "2023-12-14",
              points: 100,
              grade: null,
              instructions:
                "<p>Analyze the time and space complexity for the given sorting algorithms.</p>",
              attachments: [{ name: "algorithms_homework.pdf", url: "#" }],
              feedback: null,
            },
            {
              id: 6,
              subject: "English Literature",
              title: "Shakespeare Sonnet Analysis",
              status: "Overdue",
              dueDate: "2023-12-01",
              points: 25,
              grade: null,
              instructions:
                "<p>Choose one Shakespearean sonnet and write a 500-word analysis of its themes and literary devices.</p>",
              attachments: [{ name: "sonnet_list.pdf", url: "#" }],
              feedback: null,
            },
            {
              id: 7,
              subject: "Physics II",
              title: "Wave Motion Problems",
              status: "Graded",
              dueDate: "2023-11-28",
              points: 50,
              grade: 45,
              instructions:
                "<p>Complete the problem set on wave motion and sound.</p>",
              attachments: [{ name: "wave_problems.pdf", url: "#" }],
              feedback:
                "<p>Excellent work on the calculations. Be sure to double-check your units on question 4.</p>",
            },
          ],

          init() {
            this.fetchAssignmentDetails();
          },

          fetchAssignmentDetails() {
            this.isLoading = true;
            this.error = null;

            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get("id"));

            // Simulate network delay
            setTimeout(() => {
              try {
                if (!id) {
                  throw new Error("No assignment ID provided.");
                }

                const foundAssignment = this.allAssignments.find(
                  (a) => a.id === id
                );

                if (!foundAssignment) {
                  throw new Error(
                    "Assignment not found. It may have been deleted."
                  );
                }

                // Format the date for display
                const date = new Date(foundAssignment.dueDate + "T00:00:00");
                this.assignment = {
                  ...foundAssignment,
                  dueDate: date.toLocaleDateString("en-US", {
                    month: "short",
                    day: "numeric",
                    year: "numeric",
                  }),
                };

                this.isLoading = false;
              } catch (e) {
                this.error = e.message || "An unknown error occurred.";
                this.isLoading = false;
              }
            }, 800); // Shorter delay for detail page
          },

          handleFileInput(event) {
            this.addFiles(event.target.files);
          },

          handleFileDrop(event) {
            this.addFiles(event.dataTransfer.files);
          },

          addFiles(files) {
            for (let i = 0; i < files.length; i++) {
              // Check for duplicates
              if (!this.uploadedFiles.find((f) => f.name === files[i].name)) {
                this.uploadedFiles.push(files[i]);
              }
            }
          },

          removeFile(fileName) {
            this.uploadedFiles = this.uploadedFiles.filter(
              (f) => f.name !== fileName
            );
          },

          submitAssignment() {
            if (this.isSubmitting) return;

            this.isSubmitting = true;
            console.log("Submitting assignment...");
            console.log(
              "Files:",
              this.uploadedFiles.map((f) => f.name)
            );
            console.log("Comment:", this.submissionComment);

            // Simulate submission delay
            setTimeout(() => {
              // Update the assignment's status in the UI
              this.assignment.status = "Submitted";
              this.isSubmitting = false;
              // In a real app, you'd clear the uploadedFiles and comment
              // after a successful submission.
            }, 1500);
          },
        };
      }

      document.addEventListener("alpine:init", () => {
        Alpine.data("assignmentDetailData", assignmentDetailData);
      });
    </script>
  </body>
